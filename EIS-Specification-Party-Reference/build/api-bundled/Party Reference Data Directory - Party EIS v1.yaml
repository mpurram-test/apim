      required: false
      in: query
      description: Optional attribute that indicates if complete list of phones should be suppressed from the response. Suppressing attributes that are not needed by the consumer will increase the performance of the API. If indicator is not provided, the API will suppress the complete list of phones (true is the default). However, provided that suppressPartyIndicator is false (default value), the primary, secondary, and fax phones are returned with the party demographic information by the retrieveParty API, provided they are defined. As such, the phones array may contain phone numbers with phoneType = "PRI", "SEC", or "FAX" respectively. To obtain the complete list of phones, set suppressPhonesIndicator = false.
      example: true
