        description: EIS-Mandatory Data Missing: {description}
                                                 

        code: 2000102
        description: EIS-Invalid Data: {description}
                                       

        code: 2000105
        description: EIS-Unaccepted Special Characters: {description}

        code: 8000101
        description: EIS-Mandatory Data Missing: {description}
                                                

        code: 8000102
        description: EIS-Invalid Data: {description}
