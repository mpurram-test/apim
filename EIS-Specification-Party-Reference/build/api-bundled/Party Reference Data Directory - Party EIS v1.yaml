    relatedAccountsPaginationToken:
      name: relatedAccountsPaginationToken
      in: header
      description: If no value is supplied, then the first set of related accounts (up to the current record limit) will be returned. If additional related accounts are being requested, then populate the pagination token with the token returned during the previous request. For instance, the first request returns 50 related accounts along with a pagination token in the response. The token returned in the response is   supplied as input for the second request, thus returning related accounts 51 to 100, along with an updated token that can be supplied to return related accounts 101 to 150.
      required: false
      example: DP,3340002482,001,023,901,2023-12-18
      schema:
        type: string
    relatedAccountsCurrentRecordLimit:
      name: relatedAccountsCurrentRecordLimit
      in: query
      required: false
      description: |-
        The maximum number of related accounts that should be returned in response to this request. This is the limit that should be applied to the single response message.  The relatedAccountsCurrentRecordLimit should not be changed after it has been established because all the following pages will have the same limit. From the second page on, the system does not accept or take into account the alternate value for the relatedAccountsCurrentRecordLimit (i.e. if the first call to the API supplies the value 50, then the API will limit the response to 50 records regardless of the value supplied for relatedAccountsCurrentRecordLimit in the second or later calls).
        The consumer may send a value to limit the records. Although the API accepts the requested limit, the API is constrained to a derived maximum based upon the number and size of the attributes requested.  If the requested number of related accounts per page exceeds the maximum number that can be supported, the API provides an error along with the maximum number of related accounts that can be supported. In other words, if the consumer provides a value of 1000, it is unlikely that the system could return that much data in one request so an error will be returned. As such, choose a reasonable limit. 
        If no value is supplied, all records up to the derived maximum will be returned as part of one inquiry request and each page size may vary (based upon the size of the specific list of related accounts returned) and will not return consistent number of related accounts (e.g. 75 could be returned in the first response followed by 73 in the second).
        Note that this limit represents the maximum number of records that the consumer is able to handle in a single message. The actual number of records selected could be more than this or less than this, depending on the number of available records matching the selection criteria. If the result set is more than this limit, the service will return a pagination token (relatedAccountsPaginationToken) to allow the consumer to continue processing the result set.  
      example: 50
      schema:
        type: number
        nullable: false
    suppressPartyIndicator:
      name: suppressPartyIndicator
      required: false
      in: query
      description: 'Optional attribute that indicates if party demographic information, KYC documentary identifications, and limited phones contact points (primary, secondary, fax only) should be suppressed from the response. Suppression of the specified attributes is recommended when invoking this API to obtain the next set of related parties and/or the next set of related accounts when the first invocation did not return them all (i.e., relatedPartiesPaginationToken or relatedAccountsPaginationToken has a value in the response). If the party demographic information, phone contact points, and KYC documentary identifications are not needed in the response when obtaining subsequent sets of the related parties and/or related accounts, then set the value of this attribute to true. Suppressing attributes that are not needed by the consumer will increase the performance of the API. If indicator is not provided, the API will not suppress the specific party attributes (false is the default).  '
      example: false
      schema:
        type: boolean
        nullable: false
    suppressEmailAddressesIndicator:
      name: suppressEmailAddressesIndicator
      required: false
      in: query
      description: 'Optional attribute that indicates if email addresses should be suppressed from the response. Suppressing attributes that are not needed by the consumer will increase the performance of the API. If indicator is not provided, the API will suppress email addresses (true is the default). '
      example: true
      schema:
