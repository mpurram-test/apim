      nullable: false
    dunsIdentifierRegister:
      type: string
      example: '150483782'
      description: 'The Dun & Bradstreet D-U-N-S Number is a unique nine-digit identifier for businesses. This number is assigned once the patented identity resolution process, part of our DUNSRight methodology, identifies a company as being unique from any other in the Dun & Bradstreet Data Cloud. The D-U-N-S Number is used as the starting point for any company''s Live Business Identity, the most comprehensive and continually updated view of any company in the Data Cloud. D-U-N-S Numbers are often referenced by lenders and potential business partners to help predict the reliability and/or financial stability of the company in question. D-U-N-S, which stands for data universal numbering system, is used to maintain up-to-date and timely information on more than hundreds of millions global businesses. The D-U-N-S Number also enables identification of relationships between corporate entities (hierarchies and linkages), another key element of Live Business Identity and commercial risk assessment practices. '
      nullable: false
