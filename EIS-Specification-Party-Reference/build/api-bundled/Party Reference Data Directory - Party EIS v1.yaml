      required: false
      example: '1234'
      schema:
        type: string
        nullable: true
    taxIdentifierRequired:
      name: taxIdentifier
      in: header
      description: '** MANDATORY FOR SEARCHES BY TAX IDENTIFIER **  Party tax identifier. Tax identifier type is optional. If supplied, API will ensure tax identifier is in valid format for the type of tax identifier.'
      required: true
      example: '283551234'
      schema:
        type: string
        nullable: true
    phoneNumber:
      name: phoneNumber
      in: header
      description: '** MANDATORY WHEN SEARCHING BY PHONE ** Phone Number'
      required: false
      example: '3303910005'
      schema:
        type: string
        nullable: true
    middleName:
      name: middleName
      in: header
      description: '** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS **  The middle name of a person party.  Search is case insensitive.  Applicable for person parties only (partyType = PERSON).'
      required: false
      example: David
      schema:
        type: string
        nullable: true
    namePrefix:
      name: prefix
      in: header
      description: '** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS **  The name prefix/title (greeting or salutation) for a person party (e.g. MR, MS, MRS, MISS, DR). The valid values are available from the retrievePersonControls API, namePrefixValidValues[].namePrefix. Search is case insensitive. Applicable for person parties only (partyType = PERSON).'
      required: false
      example: DR
      schema:
        type: string
        nullable: true
    nameSuffix:
      name: suffix
      in: header
      description: '** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS **  The name suffix for a person party, which contains one or more professional suffix or title abbreviations that follows a person''s name, indicating their profession, academic achievements, or professional status. Examples include "MD" for medical doctor, "DDS" for Doctor Dental Surgury, "JD" for Juris Doctor, "RN" for Registered Nurse, "CPA" for Certified Public Accountant, "CMA" for Certified Management Accountant, or "MBA" signifies that the person holds a Master of Business Administration degree. The valid values are available from the retrievePersonControls API, nameSuffixValidValues[].nameSuffix. Search is case insensitive. Example: PHD  Applicable for person parties only (partyType = PERSON).'
      required: false
      example: MD
      schema:
        type: string
        nullable: true
    nameGeneration:
      name: generation
      in: header
      description: '** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS **  Party/Customer Generation. The valid values are available from the retrievePersonControls API, nameGenerationValidValues[].nameGeneration.  Search is case insensitive.  Examples: JR, SR, I, II, III.  Applicable for person parties only (partyType = PERSON).'
      required: false
      example: SR
      schema:
        type: string
        nullable: true
    partyNameStandardizationRequiredIndicator:
      name: partyNameStandardizationRequiredIndicator
      required: false
      in: header
      description: '** OPTIONAL FOR SEARCHES THAT INCLUDE PARTY NAME ATTRIBUTES **  Controls whether name standardization is applied to party name attributes before searching.  True: (default value) Standardize name attributes before searching. False: DO NOT standarize name attributes before searching.'
      example: true
      schema:
        type: boolean
        nullable: false
    addressLine2:
      name: addressLine2
      in: header
      description: '** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS **  Party postal address line 2. Search is case insensitive.'
      required: false
      schema:
        type: string
        nullable: true
    addressLine3:
      name: addressLine3
      in: header
      description: '** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS ** Party postal address line 3. Search is case insensitive.'
      required: false
      schema:
        type: string
        nullable: true
    countryCode:
      name: postalAddressCountryCode
      in: header
      description: '** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS ** Party postal address country code. The valid values are available from the retrievePersonControls API and retrieveOrganizationControls API, countryCodeValidValues[].countryISOalpha3Code. Search is case in-sensitive.'
      required: false
      example: USA
      schema:
        type: string
        nullable: true
    postalAddressStandardizationRequiredIndicator:
      name: postalAddressStandardizationRequiredIndicator
      required: false
      in: header
      description: '** OPTIONAL FOR SEARCHES THAT INCLUDE ADDRESS ATTRIBUTES **  True: (default value) Standardize address attributes before searching. False: DO NOT standarize address attributes before searching. Address standardization can only be performed on US addresses. If country code is specified and it is not equal to USA, then the address will NOT be standardized. The following address search attributes are required before an address can be standardized: addressLine1, city, and stateProvince OR addressLine1 and postalCode.'
      example: true
      schema:
        type: boolean
        nullable: false
