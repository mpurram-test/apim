      description: Phone number.
    phoneExtensionRegister:
      type: string
      example: '3459'
      description: Phone number extension.
      nullable: false
    phoneEffectiveDate:
      type: string
      format: date
      nullable: false
      example: '2025-06-30'
      description: Effective date of the phone number. Phone number can be future dated. If this attribute is not supplied when adding a phone number, it will be defaulted to the system date. The effective date is required to delete the phone. Format accepted CCYY-MM-DD.
    phoneExpiryDateRegister:
