      nullable: false
      description: 'Returns the EIS error description or source system description, depending upon the errors instance. EIS specific error codes are prefixed with ''EIS-'' in the message. Source system error codes are prefixed with the source system mnemonic (e.g. ''FIS-''). If failure occurs at service level due to missing attributes, incorrect format of attributes, or invalid values, description is populated with the attribute causing the error. '
