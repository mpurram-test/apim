        In comparison, customer since date (customerSinceDate) reflects the date on which a party first had a formal party-to-party or account-to-party relationship documented at the bank. This date is derived by the system of record and should only be updated by operations applications.
        Input is accepted in UTC format of CCYY-MM-DD.
