    matchingPartiesSentRecordCount:
      type: integer
      nullable: false
      description: 'Number of matching parties included in the response. '
      example: 50
    matchingPartiesPaginationToken:
      type: string
      nullable: false
      description: 'If more matching parties are available to return, this element will contain the pagination token that the consumer can provide to this API to obtain the next set of matching parties. '
      example: Y|||||P|00000028735|SMITH||
    partyIdentifier:
      type: string
      nullable: false
      example: '2525770'
      description: The party identifier is a unique identifier for a party.
    partyType:
      description: Party Type
      type: string
      nullable: false
      enum:
        - PERSON
        - ORGANIZATION
      example: PERSON
    firstNameRegister:
      type: string
      nullable: false
      description: The first name (given name) of a person party
      example: John
    middleNameRegister:
      type: string
      nullable: false
      description: The middle name of a person party.
      example: David
    lastName:
      type: string
      nullable: false
      description: The last name (Surname) of a person party. Last name is required for a person party and cannot be deleted.
      example: Doe
    namePrefixRegister:
      type: string
      nullable: false
      description: Personal Customer Prefix/Title (e.g. MR, MS, MRS, MISS, DR). The valid values are available from the retrievePersonControls API, namePrefixValidValues[].namePrefix.
      example: DR
    nameSuffixRegister:
      type: string
      nullable: false
      description: The name suffix for a person party contains one or more professional suffix or title abbreviations that follows a person's name, indicating their profession, academic achievements, or professional status. Examples include "MD" for medical doctor, "DDS" for Doctor Dental Surgury, "JD" for Juris Doctor, "RN" for Registered Nurse, "CPA" for Certified Public Accountant, "CMA" for Certified Management Accountant, or "MBA" signifies that the person holds a Master of Business Administration degree. The valid values are available from the retrievePersonControls API, nameSuffixValidValues[].nameSuffix.
      example: MBA
    nameGenerationRegister:
      type: string
      description: Party/Customer Generation (e.g. JR, SR, I, II, III). The valid values are available from the retrievePersonControls API, nameGenerationValidValues[].nameGeneration.
      example: SR
    birthDateRegister:
      type: string
      format: date
      nullable: false
      example: '2000-01-01'
      description: Birth date of the party. Cannot be a date greater than the current date.
    employerNameRegister:
      type: string
      nullable: false
      example: SEACOAST BANK
      description: Name of party employer. Accepts any employer name up to 250 characters.
    organizationName:
      type: string
      nullable: false
      description: Business/Organization Customer Name
      example: AUTOMATION TECHNOLOGIES CONSULTING INC
    organizationNameType:
      type: string
      example: LEGAL_TITLE
      description: 'The type of the organization name. Example values include: LEGAL_TITLE, NAME'
      nullable: false
    organizationTypeRegister:
      type: string
      example: S_CORP
      description: 'The type of the organization/legal entity type. Example values include: ASSOCIATION, LTD_LBLTY_CMPNY, LTD_PRTNTRSHP, PBLC_CORP, S_CORP, SOLE_PROP. The valid values are available from the retrieveOrganizationControls API, organizationTypeValidValues[].organizationType.'
      nullable: false
    establishmentDateRegister:
      type: string
      format: date
      example: '2000-01-01'
      description: Date the Business/Organization established the business in YYYY-MM-DD format. The business/organization may have been established before it was incorporated (i.e., see incoporationDate).
      nullable: false
    socialSecurityTaxIdentifierRegister:
      type: string
      nullable: false
      example: '273443309'
      description: Social security number (SSN).
    individualTaxIdentifierRegister:
      type: string
      nullable: false
      example: '940509993'
      description: 'An ITIN, or Individual Taxpayer Identification Number, is a tax processing number only available for certain nonresident and resident aliens, their spouses, and dependents who cannot get a Social Security Number (SSN). '
    employerTaxIdentifierRegister:
      type: string
      example: '342925198'
      description: Employer tax identification number (EIN).
      nullable: false
      x-source-mapping:
        sourceField: /rest/IBSCI/v2/customers/{CIApplNbr} GET Entity/customer/ciCustTaxNbr /rest/IBSCISRH/v4/customers/search/name-address GET Entity/customersLst/ciCustTaxNbr
        description: Return when ciCustTaxCde = F (Federal taxpayer identification number). An EIN (Employer Identification Number) is a type of Federal Taxpayer Identification Number, specifically for businesses and other entities that are required to file various business tax returns.
    customerSinceDateRegister:
      type: string
      format: date
      nullable: false
      example: '1993-06-22'
      description: Customer since date reflects the date on which the party was first created in the system of record (FIS). This date does not reflect the date when the party first had a formal party-to-party or account-to-party relationship documented at the bank. Format of CCYY-MM-DD is accepted.
    customerRelationshipTypeRegister:
      type: string
      nullable: false
      example: CUSTOMER
      description: Identifies the status of the customer relationship. The valid values are available from the retrievePersonControls API, customerRelationshipTypeValidValues[].customerRelationshipType. Valid Values include PROSPECT, CUSTOMER, and EXTERNAL_CONTACT. The valid values are available from the retrievePersonControls API and retrieveOrganizationControls APIs, customerRelationshipTypeValidValues[].customerRelationshipType.
    phoneType:
      type: string
      nullable: false
      example: MBL
      description: 'The phone type indicates the purpose/context for use of the phone. Example values include: BUS = Business, FAX = Fax, HME = Home, INC = International Cell,  INT = Internet, INW = International Work, MBL = Mobile, PRI = Primary, RES = Residence, SEC = Secondary, WRK = Work. The valid values are available from the retrievePersonControls API and retrieveOrganizationControls API, phoneTypeValidValues[].phoneType.'
    phoneInternationalAccessCodeRegister:
      type: string
      example: '001'
      description: 'An international access code, also known as a dial-out code, is a number dialed from within a country to initiate a call to another country. This signals to the phone network that an international call is being placed. '
      nullable: false
    phoneISDcodeRegister:
      type: string
