        2000102 = EIS-Invalid Data: {description}

        2000105 = EIS-Unaccepted Special Characters: {description}

        8000101 = EIS-Mandatory Data Missing: {description}
                                              

        8000102 = EIS-Invalid Data: {description}
                                    
