      type: string
      nullable: false
      example: '9000101'
      description: 'Returns the EIS error code or source system error code, depending upon the errors instance. EIS specific error codes  are prefixed with ''EIS-'' in the message. Source system error codes are prefixed with the source system mnemonic (e.g. ''FIS-'') in the message.  9000101 = EIS-Unauthorized: The operation is not authorized.'
      x-serviceCodes: |
