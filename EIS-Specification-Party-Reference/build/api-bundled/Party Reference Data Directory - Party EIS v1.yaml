        The party start/since date reflects the date in which a party is created. Depending upon the provider, the date reflects the date in which the party was first a prospect. There are no defaults to this attribute. 
        In comparison, customer since date (customerSinceDate) reflects the date on which a party first had a formal party-to-party or account-to-party relationship documented at the bank. This date is derived by the system of record and should only be updated by operations applications.
        Input is accepted in UTC format of either CCYY-MM-DD. To delete, set attribute to null.
