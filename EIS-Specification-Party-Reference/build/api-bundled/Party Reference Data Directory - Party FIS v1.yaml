openapi: 3.0.0
info:
  title: Party Reference Data Directory - FIS Party (Person, Organization) Entity
  version: 1.0.0
  x-versionDetails:
    versionNumber: 1.0.0
    versionDescription: Initial Draft
  description: |-
    This API retrieves, creates and/or maintains party demographic data in FIS for an
     person or organization party. This collection of person and organization APIs allows retrieve, create, maintain, and validate capabilities for the party entity. Additionally, person and organization control attributes can be retrieved to support the pre-validation of attributes prior to creating, maintaining, or retrieving the paty entity entity.

     ## Service Domain Role:

     Maintain a comprehensive set of party reference details, including legal
     entity structure, demographics, administrative, verification related
     properties, status and activity summaries.

     ## Example of Use:

     Party legal entity details are obtained for selection in an internal sales
     campaign  

     ## Detailed Summary:

     This service domain maintains a comprehensive set of party reference
     information. This has significantly different content and functionality
     depending on party/customer type. The main reference information is legal
     entity structure. It is possible that additional party type specific
     reference service domains will be added in later versions of the model (for
     example reference details specific to customer types, brokers, agents,
     counterparties, sub-custodians etc.)
  contact:
    name: EIS
    email: EISSupportTeam@seacoastbank.com
  x-serviceDomain: Party Reference Data Directory
  x-businessDomain: Party Reference
  x-apiType: Inner
  x-tags: Party
  x-systemOfRecord: FIS
  x-apimURLsuffix: party-reference-data-directory-fis
  x-apimURLversion: v1
  x-apimServiceURL: https://customer.api.uat.seacoastbank.com
servers:
  - url: https://api.dev.seacoastbank.com/party-reference-data-directory-fis/v1
    description: Development / Testing Server
  - url: https://api.seacoastbank.com/party-reference-data-directory-fis/v1
