components:
  securitySchemes:
    OAuth2:
      type: oauth2
      description: Seacoast OAuth 2.0 client credential code flow
      flows:
        clientCredentials:
          tokenUrl: https://api.dev.seacoastbank.com/auth/v1/token
          scopes: {}
  parameters:
    systemIdentifier:
      name: systemIdentifier
      required: true
      in: header
      description: The Calling Application Mnemonic (i.e. IVR, QFD).
      example: IVR
      schema:
        type: string
        minLength: 3
        maxLength: 3
    uuid:
      name: uuid
      required: true
      in: header
      description: The request identifier or UUID can be any alphanumeric string with a max length of 50 characters. It must be a unique identifier that is generated for each API request and should not be duplicated or repeated for subsequent calls. If a transaction fails and the consumer is attempting to retry the failed transaction (with the same request payload), it is expected that the UUID would be the same.
      example: 123e4567-e89b-12d3-a456-426614174000
      schema:
        type: string
    requestDateTime:
      name: requestDateTime
      required: true
      in: header
      description: 'Date/Time the calling application/consumer (systemIdentifier) invoked this API in UTC format (Coordinated Universal Time), CCYY-MM-DDThh:mm:ss.sssZ or CCYY-MM-DDThh:mm:ssZ, unless an alternate time zone is requested by supplying requestTimeZone. '
      example: '2020-03-14T23:59:59.001Z'
      schema:
        type: string
        format: date-time
    agentIdentifier:
      name: agentIdentifier
      required: true
      in: header
      description: 'The agent identifier identifies the user who invoked the call. Guidelines  for populating are as follows: 1) If the API call originates as a result of an action from by an user, from a user-interface (UI) or otherwise, then the application can provide the individual’s user identifier 2) If the API call is originated by a batch program then the application can send the name of the program.'
      example: PL00000
      schema:
        type: string
    requestTimeZone:
      name: requestTimeZone
      required: false
      in: header
      description: |-
        Optional attribute that accepts and returns date/time in the requested time zone format. If no value is supplied, then all date/time attributes are accepted in UTC format (Coordinated Universal Time) using either the CCYY-MM-DDThh:mm:ss.sssZ or CCYY-MM-DDThh:mm:ssZ format, and are returned in UTC format, CCYY-MM-DDThh:mm:ss.sssZ. For instance, if "America/New_York" is supplied, then all date/time attributes are accepted in CCYY-MM-DDThh:mm:ss.sss or CCYY-MM-DDThh:mm:ss format and returned in CCYY-MM-DDThh:mm:ss.sss format. The time zone is assumed as EST in the winter and EDT in the summer. 
        The valid values are available from the retrievePersonControls API, timeZoneValidValues[].timeZone. 
      example: America/New_York
      schema:
        type: string
    taxIdentifierRequired:
      name: taxIdentifier
      in: header
      description: '** MANDATORY FOR SEARCHES BY TAX IDENTIFIER **  Party tax identifier. Tax identifier type is optional. If supplied, API will ensure tax identifier is in valid format for the type of tax identifier.'
      required: true
      example: '283551234'
      schema:
        type: string
        nullable: true
    customerRelationshipTypeFilter:
      name: customerRelationshipTypeFilter
      required: false
      in: query
      description: 'Filter the parties by the status of the customer relationship. The valid values are available from the retrievePersonControls API, customerRelationshipTypeFilterValidValues[].customerRelationshipTypeFilter. '
      example: CUSTOMERS_ONLY
      schema:
        type: string
        enum:
          - ALL
          - CUSTOMERS_ONLY
          - CUSTOMERS_AND_PROSPECTS
          - EXTERNAL_CONTACTS_ONLY
          - PROSPECTS_ONLY
    searchPartiesByTaxIdentifierPaginationToken:
      name: paginationToken
      in: header
      description: If no value is supplied, then the first set of matching parties (up to the current record limit of 25) will be returned. If additional matching parties are being requested, then populate the pagination token with the token returned during the previous request. For instance, the first request returns 25 matching parties along with a pagination token in the response. The token returned in the response is supplied as input for the second request, thus returning matching parties 26 to 50, along with an updated token that can be supplied to return matching parties 51 to 75.
      required: false
      example: Y||000000000|00000006008||
      schema:
        type: string
    partyType:
      name: partyType
      in: query
      description: |-
        ** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS ** 
         Denotes if a party is an person/individual or organization/business. Valid values are "PERSON" or "ORGANIZATION". If the party type is not supplied as input, the API searches for person/individual parties only (partyType = PERSON). To search for an organization/business, set partyType = "ORGANIZATION". The party type qualifier is not applicable when searching with tax identifier (taxIdentifier).
      required: false
      example: PERSON
      schema:
        type: string
        nullable: true
    firstName:
      name: firstName
      in: header
      description: '** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS **  The first name (given name) of a person party.  Search is case insensitive.  Applicable for person parties only (partyType = PERSON). '
      required: false
      example: John
      schema:
        type: string
        nullable: true
    lastName:
      name: lastName
      in: header
      description: '** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS **  The last name (surname) of a person party.  Search is case insensitive.  Applicable for person parties only (partyType = PERSON).'
      required: false
      example: Doe
      schema:
        type: string
        nullable: true
    organizationName:
      name: organizationName
      in: header
      description: '** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS **  Business/Organization Customer Name.  Search is case insensitive.  Applicable for organization parties only (partyType = ORGANIZATION).'
      required: false
      example: AUTOMATION TECHNOLOGIES CONSULTING INC
      schema:
        type: string
        nullable: true
    addressLine1:
      name: addressLine1
      in: header
      description: '** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS **  Party postal address line 1. Search is case insensitive.'
      required: false
      example: 401 MAIN ST
      schema:
        type: string
        nullable: true
    postalAddressCity:
      name: postalAddressCity
      in: header
      description: '** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS ** Party postal address city. Search is case insensitive.'
      required: false
      example: HINCKLEY
      schema:
        type: string
        nullable: true
    postalAddressStateProvince:
      name: postalAddressStateProvince
      in: header
      description: '** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS ** Party postal address state or province. If country is USA, then values are defined by codes available from the retrievePersonControls API, stateProvinceValidValues[].stateProvince. Until postalAddressCountryCode is added as an optional header attribute, the country is assumed to be USA. '
      required: false
      example: OH
      schema:
        type: string
        nullable: true
    postalCode:
      name: postalCode
      in: header
      description: '** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS ** Party postal address postal code (zip code). '
      required: false
      example: 44233
      schema:
        type: string
        nullable: true
    searchType:
      name: searchType
      required: false
      in: query
      description: |-
        The type of search to be performed, partial or full. If PARTIAL is requested, a partial match of search criteria will return the party. If FULL is requested, the whole keyword must match the search criteria to return the customer. 

        PARTIAL: Returns results where the party attribute starts with or contains the search criteria. For example, searching for a postalCode of "338" returns all parties with postal codes beginning with "338" (e.g., 33801, 33813). Searching for addressLine1 of "LAKE" returns all parties with street name within the address line 1 containing "LAKE" (e.g., 98 LAKE BYRD BLVD, 2851 S LAKE LETTA DR, 947 LAKE ANGELO DR, 2720 LAKEVIEW DR). Searching for city of "LAKE" returns all parties with city names beginning with "LAKE" (e.g. LAKE GENEVA, LAKE PARK, LAKE PLACID). Partial matching applies to:

          * addressLine1
          * postalAddressCity
          * postalCode
          * firstName
          * organizationName

        When searching for a person (partyType = "PERSON"), the person is returned if the first name begins with the value supplied for firstName and the last name is an exact match. For instance, if the firstName is "JOE" and lastName is "SMITH", then both JOEL SMITH and JOE SMITH are returned in the response. However, the party with first name JOE and last name SMITHSON would not be returned, since the last name must be an exact match regardless of the searchType. When searching for an organization (partyType = "ORGANIZATION"), the organization is returned if the organization name begins with the value supplied for organizationName. For instance, if searching with organizationName of "SMITH", then all organizations that begin with SMITH are returned (e.g., SMITH AUTO LLC, SMITH CAR WASH LLC, SMITH ENTERPRISES, SMITH LAWN SERVICE). The postalAddressStateProvince must be an exact match regardess of the partyType. 

        FULL: Returns results only when the keyword is an exact match for the party data.

        The valid values are available from the retrievePersonControls API, searchTypeValidValues[].searchType. 

        The search type qualifier is not applicable when searching with tax identifier (taxIdentifier).
      example: PARTIAL
      schema:
        type: string
        enum:
          - PARTIAL
          - FULL
    searchPartiesPaginationToken:
      name: paginationToken
      in: header
      description: If no value is supplied, then the first set of matching parties (up to the current record limit of 25) will be returned. If additional matching parties are being requested, then populate the pagination token with the token returned during the previous request. For instance, the first request returns 25 matching parties along with a pagination token in the response. The token returned in the response is supplied as input for the second request, thus returning matching parties 26 to 50, along with an updated token that can be supplied to return matching parties 51 to 75.
      required: false
      example: Y|||||P|00000028114|SMITH||
      schema:
        type: string
    partyIdentifier:
      name: partyIdentifier
      in: header
      description: Customer identifier value. The party identifier is a unique identifier for a party.
      example: '2525770'
      required: true
      schema:
        type: string
        nullable: false
        maxLength: 11
    retrievePartyToAccountRelationshipsPaginationToken:
      name: paginationToken
      in: header
      description: If no value is supplied, then the first set of related accounts (up to the current record limit of 50) will be returned. If additional related accounts are being requested, then populate the pagination token with the token returned during the previous request. For instance, the first request returns 50 related accounts along with a pagination token in the response. The token returned in the response is supplied as input for the second request, thus returning related accounts 51 to 100, along with an updated token that can be supplied to return related accounts 101 to 150.
      required: false
      example: DP,3340002482,001,023,901,2023-12-18
      schema:
        type: string
    relatedAccountsPaginationToken:
      name: relatedAccountsPaginationToken
      in: header
      description: If no value is supplied, then the first set of related accounts (up to the current record limit) will be returned. If additional related accounts are being requested, then populate the pagination token with the token returned during the previous request. For instance, the first request returns 50 related accounts along with a pagination token in the response. The token returned in the response is   supplied as input for the second request, thus returning related accounts 51 to 100, along with an updated token that can be supplied to return related accounts 101 to 150.
      required: false
      example: DP,3340002482,001,023,901,2023-12-18
      schema:
        type: string
    relatedAccountsCurrentRecordLimit:
      name: relatedAccountsCurrentRecordLimit
      in: query
      required: false
      description: |-
        The maximum number of related accounts that should be returned in response to this request. This is the limit that should be applied to the single response message.  The relatedAccountsCurrentRecordLimit should not be changed after it has been established because all the following pages will have the same limit. From the second page on, the system does not accept or take into account the alternate value for the relatedAccountsCurrentRecordLimit (i.e. if the first call to the API supplies the value 50, then the API will limit the response to 50 records regardless of the value supplied for relatedAccountsCurrentRecordLimit in the second or later calls).
        The consumer may send a value to limit the records. Although the API accepts the requested limit, the API is constrained to a derived maximum based upon the number and size of the attributes requested.  If the requested number of related accounts per page exceeds the maximum number that can be supported, the API provides an error along with the maximum number of related accounts that can be supported. In other words, if the consumer provides a value of 1000, it is unlikely that the system could return that much data in one request so an error will be returned. As such, choose a reasonable limit. 
        If no value is supplied, all records up to the derived maximum will be returned as part of one inquiry request and each page size may vary (based upon the size of the specific list of related accounts returned) and will not return consistent number of related accounts (e.g. 75 could be returned in the first response followed by 73 in the second).
        Note that this limit represents the maximum number of records that the consumer is able to handle in a single message. The actual number of records selected could be more than this or less than this, depending on the number of available records matching the selection criteria. If the result set is more than this limit, the service will return a pagination token (relatedAccountsPaginationToken) to allow the consumer to continue processing the result set.  
      example: 50
      schema:
        type: number
        nullable: false
    retrievePartyToPartyRelationshipsPaginationToken:
      name: paginationToken
      in: header
      description: If no value is supplied, then the first set of related parties (up to the current record limit of 50) will be returned. If additional related parties are being requested, then populate the pagination token with the token returned during the previous request. For instance, the first request returns 50 related parties along with a pagination token in the response. The token returned in the response is supplied as input for the second request, thus returning related parties 51 to 100, along with an updated token that can be supplied to return related parties 101 to 150.
      required: false
      schema:
        type: string
    retrieveEmailAddressesPaginationToken:
      name: paginationToken
      in: header
      description: If no value is supplied, then the first set of email addresses (up to the current record limit of 10) will be returned. If additional email addresses are being requested, then populate the pagination token with the token returned during the previous request. For instance, the first request returns 10 email addresses along with a pagination token in the response. The token returned in the response is supplied as input for the second request, thus returning email addresses 11 to 20 along with an updated token that can be supplied to return email addresses 21 to 30.
      example: HME,2023-12-18
      required: false
      schema:
        type: string
    retrievePartyPhonesPaginationToken:
      name: paginationToken
      in: header
      description: If no value is supplied, then the first set of phones (up to the current record limit of 10) will be returned. If additional phones are being requested, then populate the pagination token with the token returned during the previous request. For instance, the first request returns 10 phones along with a pagination token in the response. The token returned in the response is supplied as input for the second request, thus returning phones 11 to 20 along with an updated token that can be supplied to return phones 21 to 30.
      required: false
      example: HME,2023-12-18
      schema:
        type: string
      x-source-mapping:
        sourceField: /rest/IBSCI/v2/customers/{CustNbr}/phone-numbers GET Entity/control-data/RepoResnCde /rest/IBSCI/v2/customers/{CustNbr}/phone-numbers GET Entity/control-data/RepoEffDte /rest/IBSCI/v2/customers/{CustNbr}/phone-numbers GET Entity/control-data/MoreInd
        description: Return RepoResnCde + "," + RepoEffDte (e.g., WRK,2023-12-18) if MoreInd = "Y". RepoResnCde and RepoEffDte will return a value if there are more phone numbers to be returned. To view the next set of phone numbers, resubmit the inquiry using the value returned here.
    subscriptionKey:
      name: subscriptionKey
      required: true
      in: header
      description: 'The subscription key is a unique, auto-generated access code used to control and track access to published APIs. It acts as a primary security mechanism to ensure that only authorized client applications can call the services/APIs via the API Management gateway. The subscription key functions similarly to a password or an API key but is often tied to a specific "subscription" plan, which defines the level of access, usage limits (rate limits), and associated billing information. '
      example: '{{subscriptionKey}}'
      schema:
        type: string
    validationOperation:
      name: validationOperation
      required: false
      in: query
      description: 'The validation operation indicates whether the validations are performed in the context of party creation (CREATE), maintenance (UPDATE), search (SEARCH), or retrieve (RETRIEVE). If validation operation is performed in another context, do not provide the attribute as input. '
      example: CREATE
      schema:
        type: string
        enum:
          - CREATE
          - UPDATE
          - SEARCH
          - RETRIEVE
    personControlValidationOperation:
      name: validationOperation
      required: false
      in: query
      description: |-
        The validation operation provides the context and use of the control data. By providing the context (validationOperation), only the control data that is specific to the context is returned, in order to avoid returning control data that is not being used in the particular context, thus improving performance of the APIs.  

        The validation operation indicates whether the validations are performed in the context of validating the person for creation (VALIDATE_CREATE), validating the person for maintenance (VALIDATE_UPDATE), or validating the party for retrieval (VALIDATE_RETRIEVE). All control data leveraged in the context of validating the payload (i.e. all validationOperation values beginning with VALIDATE_) are performed from the validatePerson API. Additionally, any control data required for validation rules that are specific to searching parties and not performed within the validatePerson API are returned when the validation operation is SEARCH (e.g. searchTypeValidValues, customerRelationshipTypeFilterValidValues, taxIdentifierType, stateProvinceValidValues). If the validation operation is not supplied as input, then all the control data is returned.  
      example: VALIDATE_RETRIEVE
      schema:
        type: string
        enum:
          - VALIDATE_CREATE
          - VALIDATE_UPDATE
          - VALIDATE_RETRIEVE
          - SEARCH
    organizationControlValidationOperation:
      name: validationOperation
      required: false
      in: query
      description: |-
        The validation operation provides the context and use of the control data. By providing the context (validationOperation), only the control data that is specific to the context is returned, in order to avoid returning control data that is not being used in the particular context, thus improving performance of the APIs.  

        The validation operation indicates whether the validations are performed in the context of validating the organization for creation (VALIDATE_CREATE), validating the organization for maintenance (VALIDATE_UPDATE), or validating the party for retrieval (VALIDATE_RETRIEVE). All control data leveraged in the context of validating the payload (i.e. all validationOperation values beginning with VALIDATE_) are performed from the validateOrganization API. Additionally, any control data required for validation rules that are specific to searching parties and not performed within the validateOrganization API are returned when the validation operation is SEARCH (e.g. searchTypeValidValues, customerRelationshipTypeFilterValidValues, taxIdentifierType, stateProvinceValidValues). If the validation operation is not supplied as input, then all the control data is returned.  
      example: VALIDATE_RETRIEVE
      schema:
        type: string
        enum:
          - VALIDATE_CREATE
          - VALIDATE_UPDATE
          - VALIDATE_RETRIEVE
          - SEARCH
    suppressValidationsIndicator:
      name: suppressValidationsIndicator
      required: false
      in: header
      description: 'If the suppress validations indicator is set to true, then certain validations will not be performed, provided that the API is executing in a non-production environment. If the API is executing in a production environment, suppression of validations will NOT be honored. If suppressValidationsIndicator = true and API is executing in a non-production environment, the following validations will not be applied: Social Security Number Format Validation. The capability to suppress the SSN format validation is required in the context of performing real-time account opening of Choice Home Equity Line of Credit accounts because the social security number (SSN) format validation conflicts with the empower vendor system, which does not permit valid SSNs in non-production environments. '
      example: false
      schema:
        type: boolean
        nullable: false
    retrievePartyToPartyRelationshipPaginationToken:
      name: paginationToken
      in: header
