      nullable: true
      example: '940509993'
      description: An ITIN, or Individual Taxpayer Identification Number, is a tax processing number only available for certain nonresident and resident aliens, their spouses, and dependents who cannot get a Social Security Number (SSN). To delete the individualTaxIdentifier, set the  individualTaxIdentifier to null.
    branchIdentifierUpdate:
