      format: date
      nullable: false
      example: '2000-01-01'
      description: Verification document issue date. Formats accepted CCYY-MM-DD.
    expiryDateRegister:
      type: string
      format: date
      nullable: false
      example: '2000-01-01'
      description: 'Verification document expiration date. Format accepted CCYY-MM-DD.      '
    issuingAuthorityRegister:
      type: string
      example: Bank of America
      description: 'KYC Documentary Identification document issuing authority. For example, the company who issued a credit or debit card.  '
      nullable: false
    issuingLocationRegister:
      type: string
      example: Pittsburgh
      description: KYC Documentary Identification document issuing location. For example, the city that issued an authorized city ID.
      nullable: false
    errorMessagePartyIdentifierRequired:
      type: string
      description: 'Returns the EIS error description or source system description, depending upon the errors instance. EIS specific error codes are prefixed with ''EIS-'' in the message. Source system error codes are prefixed with the source system mnemonic (e.g. ''FIS-''). If failure occurs at service level due to missing attributes, incorrect format of attributes, or invalid values, description is populated with the attribute causing the error. '
      example: 'EIS-Mandatory Data Missing: Party identifier [partyIdentifier] is required.'
    relatedAccountsSentRecordCount:
      type: integer
      nullable: false
      description: 'Number of related accounts included in the response. '
      example: 50
    relatedAccountsPaginationToken:
      type: string
      nullable: false
      description: 'If more related accounts are available to return, this element will contain the pagination token that the consumer can provide to this API to obtain the next set of related accounts. '
      example: DP,3340002482,001,023,901,2023-12-18
    accountIdentifier:
      type: string
      description: 'Unique identifier for an account. '
      example: 3340002482
    accountSourceSystemIdentifier:
      type: string
      nullable: false
      example: DP
      description: The account source system identifier (e.g. CBM = Cardbase Management, CPN = Customer Profitability, DP = Deposit System, LN = Loan System, MLOAN = Mortgage loan, RP = Relationship Packaging, SB = Safe Deposit Box). The valid values are available from the retrieveAccountControls API, accountSourceSystemIdentifierValidValues[].accountSourceSystemIdentifier.
    partyRoleCode:
      description: 'Party Account Role (e.g. 023 for Joint (and), 033 for Custodian). The party account role specifies the party''s role/relationship to the account. The valid values are available from the retrievePersonControls API and retrieveOrganizationControls APIs, accountPartyRoleCodeValidValues[].partyRoleCode. '
      type: string
      nullable: false
      example: '023'
    partyRoleEffectiveDate:
      description: Effective date of the party role/relationship (partyRoleCode). ISO Format accepted CCYY-MM-DD.
      type: string
      format: date
      nullable: false
      example: '2000-01-01'
    partyRoleExpiryDate:
      description: Expiration date of the party role/relationship (partyRoleCode). If expiration date is not defined, then party/role relationship does not expire. ISO Format accepted CCYY-MM-DD.
      type: string
      format: date
      nullable: false
      example: '2030-01-01'
    bankIdentifier:
      type: string
      nullable: false
      example: '422'
      description: Bank identifier associated with the account. The valid values are available from the retrieveAccountControls API, bankIdentifierValidValues[].bankIdentifier.
    accountCategory:
      type: string
      nullable: false
      example: D
      description: 'The account category identifies the category of the account in the system of record. In the context of a deposit account, valid values include: C = Certificate of deposit, D = Demand deposit account, K = Revolving Credit, M = Money Market, S = Savings. The valid values are available from the retrieveAccountControls API, accountCategoryValidValues[].accountCategory.'
    accountCategoryDescription:
      type: string
      nullable: false
      example: Demand deposit account
      description: 'The account category description identifies the category of the account in the system of record. The attribute contains the descriptive attribute explaining the account category (accountCategory). In the context of a deposit account, valid values include: C = Certificate of deposit, D = Demand deposit account, K = Revolving Credit, M = Money Market, S = Savings.'
    accountType:
      type: string
      nullable: false
      example: '010'
      description: The account type identifies the type of account in the system of record (e.g. 010 = CLASSIC CHECKING, 033 = PREMIER MM-PERSONAL, 049 = SEACOAST SAVINGS). The valid values are available from the retrieveAccountControls API, accountTypeValidValues[].    accountType.
    openingDate:
      description: The date the account was opened in its source system. ISO Format accepted CCYY-MM-DD.
      type: string
      format: date
      nullable: false
      example: '2000-01-01'
    closingDate:
      description: The date the account was closed. ISO Format accepted CCYY-MM-DD.
      type: string
      format: date
      nullable: false
      example: '2025-07-31'
    nextStatementDate:
      description: The date the statement will next be produced for the account. ISO Format accepted CCYY-MM-DD.
      type: string
      format: date
      nullable: false
      example: '2025-07-31'
    lastStatementDate:
      description: The date a statement was last produced for the account. If the account is new, the last statement date will not be returned until a statement is produced. ISO Format accepted CCYY-MM-DD.
      type: string
      format: date
      nullable: false
      example: '2025-06-30'
    accountStatusCode:
      description: 'Status of the account. Valid values: C = Closed, O = Open, V = Virtual Bank Manager (Internet accounts only). The value of "V" is not applicable to deposit accounts. The value of "V" is applicable to loans and other miscelleneous accounts. The valid values are available from the retrieveAccountControls API, accountStatusCodeValidValues[].accountStatusCode.'
      type: string
      nullable: false
      example: O
    accountOpenStatusCode:
      description: 'Open Status of the account. Valid values:  <Blank> = Open account B = Closed by bank C = Closed by customer E = Pending closed by customer K = Pending closed by bank P = Closed by processing Z = Zero balance account O = Opened by deposit The valid values are available from the retrieveAccountControls API, accountOpenStatusCodeValidValues[].accountOpenStatusCode.'
      type: string
      nullable: false
      example: O
    ledgerBalance:
      description: 'Ledger balance, as of last posting date. This is a monetary value with 2 decimal positions precision. '
      type: number
      format: decimal
      nullable: false
      example: 12456.17
    currentBalance:
      description: 'Current balance. The balance is calculated as ledger balance plus/minus today''s on-line activity. This is a monetary value with 2 decimal positions precision. '
      type: number
      format: decimal
      nullable: false
      example: 10456.17
    availableBalance:
      description: 'Available balance, which is the amount of funds available for withdrawal.  The balance is calculated as ledger balance minus holds minus float plus unused provisional credit (PRA) plus/minus today''s on-line transactions plus related account''s available balance if applicable. This is a monetary value with 2 decimal positions precision. '
      type: number
      format: decimal
      nullable: false
      example: 10456.17
    digitalSignature:
      type: string
      nullable: false
      description: A hexadecimal string representing the list of attributes to be requested for each transaction. Once the digital signature (digitalSignature) has been generated, store it in a configuration file or cache so that subsequent calls to the FIS dynamic API  do not need to generate it. The digital signiture is a hashed list of the requested attributes and does not change unless revisions (additions, deletions) change the list. The digital signiture is the same in test and production environments.
      example: 74 72 61 6e 73 61 63 74 69 6f 6e 54 79 70 65 2c 74 72 61 6e 73 61 63 74 69 6f 6e 43 6f 64 65 2c 74 72 61 6e 73 61 63 74 69 6f 6e 43 6f 64 65 4e 61 6d 65 2c 61 6d 6f 75 6e 74 2c 65 66 66 65 63 74 69 76 65 44 61 74 65 2c 70 6f 73 74 69 6e 67 44 61 74 65 2c 63 6f 6d 70 61 6e 79 49 64 2c 69 6e 64 69 76 69 64 75 61 6c 49 64 2c 61 75 74 6f 6d 61 74 65 64 43 6c 65 61 72 69 6e 67 48 6f 75 73 65 54 72 61 63 65 49 64 2c 64 70 54 78 6e 49 44 2c 70 61 79 65 65 4e 61 6d 65 2c 73 74 61 6e 64 61 72 64 45 6e 74 72 79 43 6c 61 73 73 43 6f 64 65 2c 73 65 63 6f 6e 64 61 72 79 53 74 61 6e 64 61 72 64 45 6e 74 72 79 43 6c 61 73 73 43 6f 64 65 2c 72 75 6e 6e 69 6e 67 42 61 6c 61 6e 63 65 2c 72 65 74 75 72 6e 65 64 49 6e 64 69 63 61 74 6f 72 2c 72 65 74 75 72 6e 65 64 49 74 65 6d 49 6e 64 69 63 61 74 6f 72
    relatedPartiesSentRecordCount:
      type: integer
      nullable: false
      description: 'Number of related parties included in the response. '
      example: 50
    relatedPartiesPaginationToken:
      type: string
      nullable: false
      description: 'If more related parties are available to return, this element will contain the pagination token that the consumer can provide to this API to obtain the next set of related parties. '
      example: 50
    partyToPartyRelationshipType:
      type: string
      nullable: false
      description: Party's relationship to another party. The valid values are available from the retrievePersonControls API and retrieveOrganizationControls API, partyToPartyRelationshipTypeValidValues[].partyToPartyRelationshipType.
      example: 124
    relationshipStartDateTime:
      type: string
      format: date-time
      nullable: false
      description: The effective or start date for the party relationship. If the attribute is not provided during an add, it is defaulted to the system date/time. Input is accepted in UTC format of either CCYY-MM-DDThh:mm:ss.sssZ or CCYY-MM-DDThh:mm:ssZ and attribute is returned in UTC format CCYY-MM-DDThh:mm:ss.sssZ, unless a specific time zone is requested by supplying requestTimeZone. For instance, if "America/New_York" is specified for requestTimeZone, date/time attributes are provided in CCYY-MM-DDThh:mm:ss.sss or CCYY-MM-DDThh:mm:ss format and returned in CCYY-MM-DDThh:mm:ss.sss format, assuming the time zone is EST in the winter and EDT in the summer.
      example: '2001-11-29T12:15:33.001Z'
    relatedPartiesOrganizationName:
      type: string
      nullable: false
      description: Business/Organization Customer Name
      example: ABC Technology Inc.
    ownershipPercentage:
      type: number
      nullable: false
      description: Applicable only for relationship type IS_BENFCL_OWNER. The ownership percentage of the Beneficial Owner.
      example: 50
    relationshipPartyTitle:
      type: string
      example: CHIEF_FINANCIAL_OFFICER
      description: Relationship party title. The relationship party title is applicable for the controlling party relationship and certain treasury management relationship types. When the relationship type is IS_CNTRLG_PARTY, the valid values are available via retrieveOrganizationControls API,  controllingPartyTitleValidValues[].controllingPartyTitle. When the relationship type is one of the treasury management relationships that allow a relationship party title (e.g. IS_TM_ACCT_AUTH_SIGNER, IS_TM_ACCT_SIGNER, IS_TM_ATSTNG_OFCR, IS_TM_AUTH_SIGNER, IS_TM_CHECK_DLG_AUTH_SIGNER, IS_TM_FX_AUTH_SIGNER, IS_TM_TMS_AUTH_SIGNER), the valid values are available via retrieveOrganizationControls API treasuryManagementAuthorityTitleValidValues[].treasuryManagementAuthorityTitle.
    partyRelationshipLastUpdateDateTime:
      description: Date/time the party relationship was last updated. Attribute is returned in the UTC format CCYY-MM-DDThh:mm:ss.sssZ, unless a specific time zone is requested by supplying requestTimeZone. For instance, if "America/New_York" is specified for requestTimeZone, date/time attribute is returned in CCYY-MM-DDThh:mm:ss.sss format, assuming the time zone is EST in the winter and EDT in the summer.
      type: string
      nullable: false
      format: date-time
      example: '2020-03-14T12:59:06.001Z'
    partyRelationshipLastUpdateUserIdentifier:
      type: string
      nullable: false
      description: The user / process that last updated the relationship
      example: PLXXXXX
    phonesSentRecordCount:
