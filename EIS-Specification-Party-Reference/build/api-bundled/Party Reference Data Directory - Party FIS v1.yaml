      nullable: false
      description: 'If more phones are available to return, this element will contain the pagination token that the consumer can provide to this API to obtain the next set of phones. '
      example: WRK,2023-12-18
    emailType:
      type: string
      nullable: false
      example: HME
      description: 'The email type indicates the purpose/context for use of the email. Example values include: BUS = Business, CON = Confidential, FAM = Family, HME = Home, KID = Children, PRI = Primary, SEC = Secondary, SPC = Special, WRK = Work. The valid values are available from the retrievePersonControls API and retrieveOrganizationControls API, emailTypeValidValues[].emailType.'
    emailAddress:
      type: string
      nullable: false
      example: MSmith@gmail.com
      description: Email address.
    emailEffectiveDate:
      type: string
      format: date
      nullable: false
      example: '2025-06-30'
      description: Effective date of the email address. Email address can be future dated. If this attribute is not supplied when adding an email address, it is defaulted to the system date. The effective date is required to delete the email. Format accepted CCYY-MM-DD.
    emailExpiryDateRegister:
      type: string
      format: date
      nullable: false
      example: '2026-01-30'
      description: Expiration date of the email address. If this attribute is not supplied when adding an email address, the email address is valid indefinitely. Format accepted CCYY-MM-DD.
    lastUpdateDateTime:
      description: Date/time the party name and/or address were last updated. Attribute is returned in the UTC format CCYY-MM-DDThh:mm:ss.sssZ, unless a specific time zone is requested by supplying requestTimeZone. For instance, if "America/New_York" is specified for requestTimeZone, date/time attribute is returned in CCYY-MM-DDThh:mm:ss.sss format, assuming the time zone is EST in the winter and EDT in the summer.
      type: string
      nullable: false
      format: date-time
      example: '2020-03-14T12:59:06.001Z'
    lastUpdateUserIdentifier:
      description: Last Updated By Name
      type: string
      example: ABC
    errorMessageLastNameRequired:
      type: string
      description: 'Returns the EIS error description or source system description, depending upon the errors instance. EIS specific error codes are prefixed with ''EIS-'' in the message. Source system error codes are prefixed with the source system mnemonic (e.g. ''FIS-''). If failure occurs at service level due to missing attributes, incorrect format of attributes, or invalid values, description is populated with the attribute causing the error. '
      example: 'EIS-Mandatory Data Missing: Last name [personName.lastName] is required.'
    errorMessageForbiddenWriteError:
      type: string
      nullable: false
      description: 'Returns the EIS error description or source system description, depending upon the errors instance. EIS specific error codes are prefixed with ''EIS-'' in the message. Source system error codes are prefixed with the source system mnemonic (e.g. ''FIS-''). If failure occurs at service level due to missing attributes, incorrect format of attributes, or invalid values, description is populated with the attribute causing the error. '
      example: 'EIS-Forbidden: The requested operation requires [Party.Write] access.'
    maintainResponse403:
      type: object
      properties:
        status:
          description: Status of the response.
          type: string
          nullable: false
          example: ERROR
        errors:
          type: array
          items:
            type: object
            properties:
              code:
                $ref: '#/components/schemas/errorCode9000103'
              message:
                $ref: '#/components/schemas/errorMessageForbiddenWriteError'
            required:
              - code
              - message
          description: EIS error instance is followed by error instance(s) from source system only in case of source system failures/errors.  If failure occurs at service level due to missing attributes, incorrect format of attributes, invalid attribute values, or connection issues, only EIS error instance is returned.
      required:
        - status
        - errors
    firstNameUpdate:
      type: string
      nullable: true
      description: The first name (given name) of a person party. To delete, set attribute to null.
      example: John
    middleNameUpdate:
      type: string
      nullable: true
      description: The middle name of a person party. To delete, set attribute to null.
      example: David
    namePrefixUpdate:
      type: string
      nullable: true
      description: Personal Customer Prefix/Title (e.g. MR, MS, MRS, MISS, DR). The valid values are available from the retrievePersonControls API, namePrefixValidValues[].namePrefix. To delete, set attribute to null.
      example: DR
    nameSuffixUpdate:
      type: string
      nullable: true
      description: The name suffix for a person party contains one or more professional suffix or title abbreviations that follows a person's name, indicating their profession, academic achievements, or professional status. Examples include "MD" for medical doctor, "DDS" for Doctor Dental Surgury, "JD" for Juris Doctor, "RN" for Registered Nurse, "CPA" for Certified Public Accountant, "CMA" for Certified Management Accountant, or "MBA" signifies that the person holds a Master of Business Administration degree. The valid values are available from the retrievePersonControls API, nameSuffixValidValues[].nameSuffix. To delete, set attribute to null.
      example: MBA
    nameGenerationUpdate:
      type: string
      description: Party/Customer Generation (e.g. JR, SR, I, II, III). The valid values are available from the retrievePersonControls API, nameGenerationValidValues[].nameGeneration. To delete, set attribute to null.
      example: SR
    birthDateUpdate:
