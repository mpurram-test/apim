    suppressPartyIndicator:
      name: suppressPartyIndicator
      required: false
      in: query
      description: 'Optional attribute that indicates if party demographic information, KYC documentary identifications, and limited phones contact points (primary, secondary, fax only) should be suppressed from the response. Suppression of the specified attributes is recommended when invoking this API to obtain the next set of related parties and/or the next set of related accounts when the first invocation did not return them all (i.e., relatedPartiesPaginationToken or relatedAccountsPaginationToken has a value in the response). If the party demographic information, phone contact points, and KYC documentary identifications are not needed in the response when obtaining subsequent sets of the related parties and/or related accounts, then set the value of this attribute to true. Suppressing attributes that are not needed by the consumer will increase the performance of the API. If indicator is not provided, the API will not suppress the specific party attributes (false is the default).  '
      example: false
      schema:
        type: boolean
        nullable: false
    suppressRelatedPartiesIndicator:
      name: suppressRelatedPartiesIndicator
      required: false
      in: query
      description: 'Optional attribute that indicates if party relationships should be suppressed from the response. Suppressing attributes that are not needed by the consumer will increase the performance of the API. If indicator is not provided, the API will suppress party relationships (true is the default). '
      example: true
      schema:
        type: boolean
        nullable: false
    suppressRelatedAccountsIndicator:
      name: suppressRelatedAccountsIndicator
      required: false
      in: query
      description: 'Optional attribute that indicates if account relationships should be suppressed from the response. Suppressing attributes that are not needed by the consumer will increase the performance of the API. If indicator is not provided, the API will suppress account relationships (true is the default). '
      example: true
      schema:
        type: boolean
        nullable: false
    suppressEmailAddressesIndicator:
      name: suppressEmailAddressesIndicator
      required: false
      in: query
      description: 'Optional attribute that indicates if email addresses should be suppressed from the response. Suppressing attributes that are not needed by the consumer will increase the performance of the API. If indicator is not provided, the API will suppress email addresses (true is the default). '
      example: true
      schema:
        type: boolean
        nullable: false
    suppressPhonesIndicator:
      name: suppressPhonesIndicator
      required: false
      in: query
      description: Optional attribute that indicates if complete list of phones should be suppressed from the response. Suppressing attributes that are not needed by the consumer will increase the performance of the API. If indicator is not provided, the API will suppress the complete list of phones (true is the default). However, provided that suppressPartyIndicator is false (default value), the primary, secondary, and fax phones are returned with the party demographic information by the retrieveParty API, provided they are defined. As such, the phones array may contain phone numbers with phoneType = "PRI", "SEC", or "FAX" respectively. To obtain the complete list of phones, set suppressPhonesIndicator = false.
      example: true
      schema:
        type: boolean
        nullable: false
    suppressKYCidentificationsIndicator:
      name: suppressKYCidentificationsIndicator
      required: false
      in: query
      description: 'Optional attribute that indicates if KYC Documentary identifications should be suppressed from the response. Suppressing attributes that are not needed by the consumer will increase the performance of the API. If indicator is not provided, the API will not suppress KYC Documentary identifications (true is the default). '
      example: true
      schema:
        type: boolean
        nullable: false
    suppressPartyRolesIndicator:
      name: suppressPartyRolesIndicator
      required: false
      in: query
      description: 'Optional attribute that indicates if party roles should be suppressed from the response. Suppressing attributes that are not needed by the consumer will increase the performance of the API. If indicator is not provided, the API will not suppress party roles (true is the default). '
      example: true
      schema:
        type: boolean
        nullable: false
    partyIdentifierOptional:
      name: partyIdentifier
      in: header
      description: Customer identifier value. The party identifier is a unique identifier for a party.
      required: false
      schema:
        type: string
        nullable: false
        maxLength: 11
    accountTypeForAccountRelationships:
      name: accountType
      in: header
      description: 'Account Type which classifies the type of product with which an account is associated (e.g. DDA, SVG, CDS, CCA, DCA, SLA, RCA, ILA, MTG). If supplied, only accounts matching the supplied accountType are returned. Multiple values can be supplied as input in a single call using a comma delimiter. For instance, if accountType is supplied as "DDA, SVG", then only the accounts with accountType both DDA, SVG are returned. '
      required: false
      example: DDA
      schema:
        type: string
        nullable: false
    accountStatusCodeForAccountRelationships:
      name: accountStatusCode
      in: header
      description: 'Status of the account. Valid values: C = Closed, O = Open, V = Virtual Bank Manager (Internet accounts only). If supplied, only accounts matching the supplied accountStatusCode are returned. Only one value can be supplied as input in a single call. For instance, if the accountStatusCode is supplied as "O", then only the accounts with accountStatusCode O (Open) are returned.  '
      required: false
      example: O
      schema:
        type: string
        nullable: false
    partyRoleCodeForAccountRelationships:
      name: partyRoleCode
      in: header
      description: 'Party Account Role (e.g. 023 for Joint, 033 for Custodian). The party account role specifies the party''s role/relationship to the account. If supplied, only accounts matching the supplied partyRoleCode are returned. Multiple values can be supplied as input in a single call using comma delimiter. For instance, if the partyRoleCode is supplied as "023, 033", then only the accounts with partyRoleCode 023 or 033 are returned. The valid values are available from the retrievePersonControls API and retrieveOrganizationControls API, partyRoleCodeValidValues[].partyRoleCode. '
      required: false
      example: 23
      schema:
        type: string
        nullable: false
    taxIdentifier:
      name: taxIdentifier
      in: header
      description: '** MANDATORY FOR SEARCHES BY TAX IDENTIFIER **  Party tax identifier. Tax identifier type is optional. If supplied, API will ensure tax identifier is in valid format for the type of tax identifier.'
      required: false
      example: '283551234'
      schema:
        type: string
        nullable: true
    taxIdentifierLastFour:
      name: taxIdentifierLastFour
      in: header
      description: '** OPTIONAL FOR SEARCHES BY PHONE AND Account- **  Last 4 digits of the tax identifier. '
      required: false
      example: '1234'
      schema:
        type: string
        nullable: true
    taxIdentifierType:
      name: taxIdentifierType
      in: header
      description: '** OPTIONAL FOR SEARCHES BY TAX IDENTIFIER **  The type of tax identifier. Tax identifier type is optional when tax identifier is supplied as input. If supplied, the API will ensure that the tax identifier is supplied and in the valid format for the type of tax identifier. The valid values are available from the retrievePersonControls API or retrieveOrganizationControls API, taxIdentifierTypeValidValues[].taxIdentifierType. '
      required: false
      example: SSN
      schema:
        type: string
        nullable: true
    phoneNumber:
      name: phoneNumber
      in: header
      description: '** MANDATORY WHEN SEARCHING BY PHONE ** Phone Number'
      required: false
      example: '3303910005'
      schema:
        type: string
        nullable: true
    middleName:
      name: middleName
      in: header
      description: '** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS **  The middle name of a person party.  Search is case insensitive.  Applicable for person parties only (partyType = PERSON).'
      required: false
      example: David
      schema:
        type: string
        nullable: true
    namePrefix:
      name: prefix
      in: header
      description: '** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS **  The name prefix/title (greeting or salutation) for a person party (e.g. MR, MS, MRS, MISS, DR). The valid values are available from the retrievePersonControls API, namePrefixValidValues[].namePrefix. Search is case insensitive. Applicable for person parties only (partyType = PERSON).'
      required: false
      example: DR
      schema:
        type: string
        nullable: true
    nameSuffix:
      name: suffix
      in: header
      description: '** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS **  The name suffix for a person party, which contains one or more professional suffix or title abbreviations that follows a person''s name, indicating their profession, academic achievements, or professional status. Examples include "MD" for medical doctor, "DDS" for Doctor Dental Surgury, "JD" for Juris Doctor, "RN" for Registered Nurse, "CPA" for Certified Public Accountant, "CMA" for Certified Management Accountant, or "MBA" signifies that the person holds a Master of Business Administration degree. The valid values are available from the retrievePersonControls API, nameSuffixValidValues[].nameSuffix. Search is case insensitive. Example: PHD  Applicable for person parties only (partyType = PERSON).'
      required: false
      example: MD
      schema:
        type: string
        nullable: true
    nameGeneration:
      name: generation
      in: header
      description: '** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS **  Party/Customer Generation. The valid values are available from the retrievePersonControls API, nameGenerationValidValues[].nameGeneration.  Search is case insensitive.  Examples: JR, SR, I, II, III.  Applicable for person parties only (partyType = PERSON).'
      required: false
      example: SR
      schema:
        type: string
        nullable: true
    partyNameStandardizationRequiredIndicator:
      name: partyNameStandardizationRequiredIndicator
      required: false
      in: header
      description: '** OPTIONAL FOR SEARCHES THAT INCLUDE PARTY NAME ATTRIBUTES **  Controls whether name standardization is applied to party name attributes before searching.  True: (default value) Standardize name attributes before searching. False: DO NOT standarize name attributes before searching.'
      example: true
      schema:
        type: boolean
        nullable: false
    addressLine2:
      name: addressLine2
      in: header
      description: '** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS **  Party postal address line 2. Search is case insensitive.'
      required: false
      schema:
        type: string
        nullable: true
    addressLine3:
      name: addressLine3
      in: header
      description: '** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS ** Party postal address line 3. Search is case insensitive.'
      required: false
      schema:
        type: string
        nullable: true
    countryCode:
      name: postalAddressCountryCode
      in: header
      description: '** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS ** Party postal address country code. The valid values are available from the retrievePersonControls API and retrieveOrganizationControls API, countryCodeValidValues[].countryISOalpha3Code. Search is case in-sensitive.'
      required: false
      example: USA
      schema:
        type: string
        nullable: true
    postalAddressStandardizationRequiredIndicator:
      name: postalAddressStandardizationRequiredIndicator
      required: false
      in: header
      description: '** OPTIONAL FOR SEARCHES THAT INCLUDE ADDRESS ATTRIBUTES **  True: (default value) Standardize address attributes before searching. False: DO NOT standarize address attributes before searching. Address standardization can only be performed on US addresses. If country code is specified and it is not equal to USA, then the address will NOT be standardized. The following address search attributes are required before an address can be standardized: addressLine1, city, and stateProvince OR addressLine1 and postalCode.'
      example: true
      schema:
        type: boolean
        nullable: false
