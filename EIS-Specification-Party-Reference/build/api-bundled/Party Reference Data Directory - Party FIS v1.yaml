    retrievePartyResponse:
      type: object
      properties:
        partyIdentifier:
          $ref: '#/components/schemas/partyIdentifier'
          x-source-mapping:
            sourceField: /rest/IBSCI/v2/customers/{CIApplNbr} GET Entity/customer/CIApplNbr
            description: Return as-is. CIS customer number to inquire on. Maximum length of 11.
        partyType:
          $ref: '#/components/schemas/partyType'
          x-source-mapping:
            sourceField: /rest/IBSCI/v2/customers/{CIApplNbr} GET Entity/customer/CISexCodeInd
            description: |-
              Return "ORGANIZATION" when CISexCodeInd = 'O' Return "PERSON" when CISexCodeInd = 'M' or 'F' If CISexCodeInd has no value (or not returned in response), return "PERSON" when CIBirthdate contains valid date
              CISexCodeInd indicates the type of customer. For individual customers, the valid values are: F = Female. M = Male. For organization customers, the valid value is: O = Organization. 
        personName:
          $ref: '#/components/schemas/personNameForRetrievePartyResponse'
        birthDate:
          $ref: '#/components/schemas/birthDateRegister'
          x-source-mapping:
            sourceField: /rest/IBSCI/v2/customers/{CIApplNbr} GET Entity/customer/CIBirthdate
            description: 'Return as-is if date contains a value and date is valid (i.e., ignoring 0000-00-00).  Customer''s date of birth. Format: CCYY-MM-DD.'
        employerName:
          $ref: '#/components/schemas/employerNameRegister'
          x-source-mapping:
            sourceField: /rest/IBSCI/v2/customers/{CIApplNbr} GET Entity/customer/CICustEmpltSchl
            description: Return as-is. The customer's employer or school.
        employmentStartDate:
          $ref: '#/components/schemas/employmentStartDateRegister'
          x-source-mapping:
            sourceField: /rest/IBSCI/v2/customers/{CIApplNbr} GET Entity/customer/CICustEmpltDte
            description: 'Return as-is if date contains a value and date is valid (i.e., ignoring 0000-00-00).  Date the customer began employment. Format: CCYY-MM-DD.'
        occupationCode:
          $ref: '#/components/schemas/occupationCodeRegister'
          x-source-mapping:
            sourceField: /rest/IBSCI/v2/customers/{CIApplNbr} GET Entity/customer/CIOccpnCde
            description: Return as-is. Describes the customer occupation, as specified on Demographic Description Segment 615 of Bank Control.
        organizationNames:
          type: array
          items:
            type: object
            description: Organization Names
            properties:
              organizationName:
                $ref: '#/components/schemas/organizationName'
                x-source-mapping:
                  sourceField: /rest/IBSCI/v2/customers/{CIApplNbr} GET Entity/customer/CICurStdNme01 /rest/IBSCI/v2/customers/{CIApplNbr} GET Entity/customer/CICurStdNme02 /rest/IBSCI/v2/customers/{CIApplNbr} GET Entity/customer/CICurStdNme03 /rest/IBSCI/v2/customers/{CIApplNbr} GET Entity/customer/CISexCodeInd
                  description: Return organizationNames[0].organizationName = CICurStdNme01 if CISexCodeInd = 'O' Return organizationNames[1].organizationName = CICurStdNme02 if CISexCodeInd = 'O' Return organizationNames[2].organizationName = CICurStdNme03 if CISexCodeInd = 'O'
            required:
              - organizationName
        organizationType:
          $ref: '#/components/schemas/organizationTypeRegister'
          x-source-mapping:
            sourceField: /rest/IBSCI/v2/customers/{CIApplNbr} GET Entity/customer/CITypOfBusCde
            description: 'Return as-is. Describes the customer''s type of business, as specified on Demographic Description Segment 615 of Bank Control.         '
        establishmentDate:
          $ref: '#/components/schemas/establishmentDateRegister'
          x-source-mapping:
            sourceField: /rest/IBSCI/v2/customers/{CIApplNbr} GET Entity/customer/CIBusSncDte
            description: 'Return as-is if date contains a value and date is valid (i.e., ignoring 0000-00-00).  Date the customer began the business. Format: CCYY-MM-DD.'
        incorporationDate:
          $ref: '#/components/schemas/incorporationDateRegister'
