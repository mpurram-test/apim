      description: Customer's NAICS code. The North American Industry Classification System (NAICS) is a classification of business establishments by type of economic activity. It is used by government and business in Canada, Mexico, and the United States of America. The use of NAICS codes is for businesses, not for individuals. One exception however is the use of the NAICS code for a sole proprietor. The valid values are available from the retrievePersonControls API and retrieveOrganizationControls API, naicsCodeValidValues[].naicsCode. To delete, set attribute to null.
      nullable: true
    employerNameUpdate:
      type: string
      nullable: true
