openapi: 3.0.0
info:
  title: Party Reference Data Directory - EIS Party (Person, Organization) Entity
  version: 1.0.1
  x-versionDetails:
    versionNumber: 1.0.0 
    versionDescription: Initial Draft
  description: >-
    This API retrieves, creates and/or maintains party demographic data in FIS for an
    person or organization party. This collection of person and organization APIs allows retrieve, create, maintain, and validate capabilities for the party entity. Additionally, person and organization control attributes can be retrieved to support the pre-validation of attributes prior to creating, maintaining, or retrieving the paty entity entity.
   
    ## Service Domain Role:

    Maintain a comprehensive set of party reference details, including legal
    entity structure, demographics, administrative, verification related
    properties, status and activity summaries.

    ## Example of Use:

    Party legal entity details are obtained for selection in an internal sales
    campaign  

    ## Detailed Summary:

    This service domain maintains a comprehensive set of party reference
    information. This has significantly different content and functionality
    depending on party/customer type. The main reference information is legal
    entity structure. It is possible that additional party type specific
    reference service domains will be added in later versions of the model (for
    example reference details specific to customer types, brokers, agents,
    counterparties, sub-custodians etc.)
  contact:
    name: EIS
    email: EISSupportTeam@seacoastbank.com
  x-serviceDomain: Party Reference Data Directory
  x-businessDomain: Party Reference
  x-apiType: Outer
  x-tags: Party
  x-systemOfRecord: EIS
  x-apimURLsuffix: party-reference-data-directory-eis # Maps to the API URL suffix in APIM
  x-apimURLversion: v1 # Maps to the API version in APIM
  x-apimServiceURL: https://customer.api.uat.seacoastbank.com # Maps to the web service URL in APIM

  
# Root-level security applies to all operations unless overwritten
security: 
  - OAuth2: []  
servers:
  - url: https://api.dev.seacoastbank.com/party-reference-data-directory-eis/v1
    description: Development / Testing Server
  - url: https://api.seacoastbank.com/party-reference-data-directory-eis/v1
    description: Production Server    
paths:
  /search:
    get:
      operationId: "searchPartiesOrch"        
      x-serviceOperation: Search Parties (searchPartiesOrch)
      x-bianVersion: v2
      tags:
        - search
      summary: >-
        Retrieve parties/customers matching the supplied search criteria (searchPartiesOrch). 
      description: >-
        Retrieve parties/customers matching the supplied search criteria. This API allows search by name, address, and tax identifier. Retrieve party demographic information and a subset of the contact point phone information (primary, secondary, fax). When the tax identifier is supplied as input, it is the only criteria that will be used to search for parties. If tax identifier is not supplied, the name and/or address criteria will be leveraged to search for the parties. 
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/searchPartiesOrchResponse200'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/searchPartiesOrchResponse400'
        '401':
          description: Access token expired or invalid
          content:
            application/json:
              schema:
                $ref: './Definitions/PartyDefinitions v1.yaml#/components/schemas/response401'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './Definitions/PartyDefinitions v1.yaml#/components/schemas/retrieveResponse403'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/retrievePartyOrchResponse404'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: './Definitions/PartyDefinitions v1.yaml#/components/schemas/response500'
      parameters:
        #  x-source-mapping:
        #    sourceField: >-
        #       1) Validate primary header attributes (systemIdentifier, uuid, requestDateTime, agentIdentifier). If any of the attributes are invalid, suspend processing.
        #
        #       2) Call retrievePersonControls with validationOperation = "SEARCH" 
        #       2.1) If any HTTP Response Code is returned other than 200, set status = "ERROR", HTTP response code to 500, and add the following error (using error template with errorCode = 2000103 and errorSubcode = 0000009) as the next instance in the errors[] array followed by the errors[] array instances from retrievePersonControls to this API errors[] array. Since the remaining attributes cannot be validated because there is no control data, suspend processing and return.
        #         errors[1].code = "2000103"
        #         #attributeDescription = "Party search" 
        #         #whenCondition = "because an error was encountered retrieving the party controls"
        #         Sample Error Message (Template) = "EIS-Request Data not Available: #attributeDescription cannot be performed #whenCondition."
        #         Sample errors[1].message = "EIS-Request Data not Available: Party search cannot be performed because an error was encountered retrieving the person controls."

        #       3) Perform additional validations that are not common to other party APIs, as delineated under specific filter attributes (e.g. partyType, taxIdentifier, taxIdentifierType, searchType, customerRelationshipTypeFilter). If error is detected, add the additional errors instance (code, message) to this API's errors response array.
        #
        #       4) If taxIdentifier is supplied as input, call searchPartiesByTaxIdentifier API and populate the response of this API from the searchPartiesByTaxIdentifier response. If any HTTP Response Code is returned other than 200, return the same HTTP Response Code along with the same status and errors array from searchPartiesByTaxIdentifier. 
        #
        #       5) If taxIdentifier is not supplied as input, call searchPartiesByNameAddress API and populate the response of this API from the searchPartiesByNameAddress response. If any HTTP Response Code is returned other than 200, return the same HTTP Response Code along with the same status and errors array from searchPartiesByNameAddress. 
        #
        - $ref: '#/components/parameters/systemIdentifier'
          x-source-mapping:
            sourceField: >-
              validatePerson systemIdentifier
              searchPartiesByTaxIdentifier systemIdentifier
              searchPartiesByNameAddress systemIdentifier
            description: >-
              Set systemIdentifier = searchPartiesOrch systemIdentifier
        - $ref: '#/components/parameters/uuid'
          x-source-mapping:
            sourceField: >-
              validatePerson uuid
              searchPartiesByTaxIdentifier uuid
              searchPartiesByNameAddress uuid
            description: >-
              Set uuid = searchPartiesOrch uuid
        - $ref: '#/components/parameters/requestDateTime'
          x-source-mapping:
            sourceField: >-
              validatePerson requestDateTime
              searchPartiesByTaxIdentifier requestDateTime
              searchPartiesByNameAddress requestDateTime
            description: >-
              Set requestDateTime = searchPartiesOrch requestDateTime
        - $ref: '#/components/parameters/agentIdentifier'
          x-source-mapping:
            sourceField: >-
              validatePerson agentIdentifier
              searchPartiesByTaxIdentifier agentIdentifier
              searchPartiesByNameAddress agentIdentifier
            description: >-
              Set agentIdentifier = searchPartiesOrch agentIdentifier
        - $ref: '#/components/parameters/requestTimeZone'
          x-source-mapping:
            sourceField: >-
              validatePerson requestTimeZone
              searchPartiesByTaxIdentifier requestTimeZone
              searchPartiesByNameAddress requestTimeZone
            description: >-
              Set requestTimeZone = searchPartiesOrch requestTimeZone
        - $ref: '#/components/parameters/subscriptionKey'
        - $ref: '#/components/parameters/partyType'
          x-source-mapping:
            sourceField: >-
              searchPartiesByNameAddress partyType
            description: >-
              Set partyType = searchPartiesOrch partyType
              
              Reference Check Rule: 
              If attribute is NOT NULL (tag supplied and contains value other than null or "") then validate that attribute is either "PERSON" or "ORGANIZATION". 

              Failure Scenario
              1. Return HTTP Response Code = 400 (Bad Request) with status = "ERROR"
              2. Populate next available error instance (errors/code, errors/message) using error template with errorCode = 2000102 and errorSubcode = 0000001 with the substitution attributes:
              #attributeDescription = "Party type"
              #attributePath = "partyType"
              #attributeValue = partyType value
              Sample Error Message (Template) = "EIS-Invalid Data: #attributeDescription [#attributePath] #attributeValue is invalid."
              Sample errors/message with partyType of UNKNOWN = "EIS-Invalid Data: Party type [partyType] UNKNOWN is invalid."

              Tolerance Check Rule: 
              If partyType is NOT NULL (tag supplied and contains value other than null or "") and taxIdentifier is supplied as input (tag supplied and contains value other than null or "") then:

              Failure Scenario
              1. Return HTTP Response Code = 400 (Bad Request) with status = "ERROR"
              2. Populate next available error instance (errors/code, errors/message) using error template with errorCode = 2000102 and errorSubcode = 0000028 with the substitution attributes:
              #attributeDescription = "Party type"
              #attributePath = "partyType"
              #whenCondition = "searching with tax identifier [taxIdentifier]"
              Sample Error Message (Template) = "EIS-Invalid Data: #attributeDescription [#attributePath] is not allowed when #whenCondition."
              Sample errors/message = "EIS-Invalid Data: Party type [partyType] is not allowed when searching with tax identifier [taxIdentifier]."
        - $ref: '#/components/parameters/taxIdentifier'
          x-source-mapping:
            sourceField: >-
              searchPartiesByTaxIdentifier taxIdentifier
            description: >-
              Set taxIdentifier = searchPartiesOrch taxIdentifier

              Before invoking searchPartiesByTaxIdentifier, perform the following additional validations to supplement the validation performed via validatePerson.
              
              Value Missing Rule: 
              If taxIdentifier is NULL (tag missing or tag supplied with value of null or "") and taxIdentifierType is supplied as input (value other than null or "") then:

              Failure Scenario
              1. Return HTTP Response Code = 400 (Bad Request) with status = "ERROR"
              2. Populate next available error instance (errors/code, errors/message) using error template with errorCode = 2000101 and errorSubcode = 0000001 with the substitution attributes:
              #attributeDescription = "Tax identifier"
              #attributePath = "taxIdentifier"
              #whenCondition = "tax identifier type is supplied as input"
              Sample Error Message (Template) = "EIS-Mandatory Data Missing: #attributeDescription [#attributePath] is required when #whenCondition."
              Sample errors/message = "EIS-Mandatory Data Missing: Tax identifier [taxIdentifier] is required when tax identifier type is supplied as input."


              Tolerance Check Rule: 
              If taxIdentifier and taxIdentifierType are NOT NULL (tag supplied and contains value other than null or "") then validate that attribute is in the valid format per the tax identifier type regular expression returned in response from retrievePersonControls API.

              1. For taxIdentifierType = "SSN", reference socialSecurityTaxIdentifierRegularExpression
              2. For taxIdentifierType = "EIN", reference employerTaxIdentifierRegularExpression
              3. For taxIdentifierType = "ITIN", reference individualTaxIdentifierRegularExpression

              Failure Scenario
              1. Return HTTP Response Code = 400 (Bad Request) with status = "ERROR"
              2. Populate next available error instance (errors/code, errors/message) using error template with errorCode = 2000102 and errorSubcode = 0000011 with the substitution attributes:
              #attributeDescription = "Tax identifier"
              #attributePath = "taxIdentifier"
              #whenCondition = "for tax identifier type"
              #attributeValue = taxIdentifierType value
              Sample Error Message (Template) = "EIS-Invalid Data: #attributeDescription [#attributePath] is formatted incorrectly #whenCondition #attributeValue."
              Sample errors/message for taxIdentifierType SSN = "EIS-Invalid Data: Tax identifier [taxIdentifier] is formatted incorrectly for tax identifier type SSN."

              Tolerance Check Rule: 
              If taxIdentifier is NOT NULL (tag supplied and contains value other than null or "") and taxIdentifierType is NOT supplied as input (tag not supplied or tag supplied with null or "") and the length > 9 digits or value is non-numeric, return error.

              Failure Scenario
              1. Return HTTP Response Code = 400 (Bad Request) with status = "ERROR"
              2. Populate next available error instance (errors/code, errors/message) using error template with errorCode = 2000102 and errorSubcode = 0000030 with the substitution attributes:
              #attributeDescription = "Tax identifier"
              #attributePath = "taxIdentifier"
              #maximumValue = "9"
              Sample Error Message (Template) = "EIS-Invalid Data: #attributeDescription [#attributePath] must be numeric value and not exceed #maximumValue digits."
              Sample errors/message = "EIS-Invalid Data: Tax identifier [taxIdentifier] must be numeric value and not exceed 9 digits."
        - $ref: '#/components/parameters/taxIdentifierType'
          x-source-mapping:
            sourceField: >-
              When supplied, this attribute is used to validate the format of taxIdentifier. It does not need to be supplied to any of the microservice APIs.
            description: >-
              Reference Check Rule: 
              If attribute is NOT NULL (tag supplied and contains value other than null or "") then validate that attribute exists in taxIdentifierTypeValidValues[].taxIdentifierType, returned in response from retrievePersonControls API.

              Failure Scenario
              1. Return HTTP Response Code = 400 (Bad Request) with status = "ERROR"
              2. Populate next available error instance (errors/code, errors/message) using error template with errorCode = 2000102 and errorSubcode = 0000001 with the substitution attributes:
              #attributeDescription = "Tax identifier type"
              #attributePath = "taxIdentifierType"
              #attributeValue = taxIdentifierType value
              Sample Error Message (Template) = "EIS-Invalid Data: #attributeDescription [#attributePath] #attributeValue is invalid."
              Sample errors/message = "EIS-Invalid Data: Tax identifier type [taxIdentifierType] #attributeValue is invalid."
        - $ref: '#/components/parameters/firstName'
          x-source-mapping:
            sourceField: >-
              searchPartiesByNameAddress firstName
            description: >-
              For searchPartiesByNameAddress, set firstName = searchPartiesOrch firstName
              
              Tolerance Check Rule: 
              If firstName (tag supplied and contains value other than null or "") and partyType = "ORGANIZATION", return error

              Failure Scenario
              1. Return HTTP Response Code = 400 (Bad Request) with status = "ERROR"
              2. Populate next available error instance (errors/code, errors/message) using error template with errorCode = 2000102 and errorSubcode = 0000012 with the substitution attributes:
              #attributeDescription = "First name"
              #attributePath = "firstName"
              #whenCondition = "party type is"
              #attributeValue = partyType value
              Sample Error Message (Template) = "EIS-Invalid Data: #attributeDescription [#attributePath] is not allowed when #whenCondition #attributeValue."
              Sample errors/message for partyType ORGANIZATION = "EIS-Invalid Data: First name [firstName] is not allowed when party type is ORGANIZATION."
        - $ref: '#/components/parameters/lastName'
          x-source-mapping:
            sourceField: >-
              searchPartiesByNameAddress lastName
            description: >-
              For searchPartiesByNameAddress, set lastName = searchPartiesOrch lastName
              
              Value Missing Rule: 
              If lastName is NULL (tag missing or tag supplied with value of null or "") and firstName is supplied as input (value other than null or "") then:

              Failure Scenario
              1. Return HTTP Response Code = 400 (Bad Request) with status = "ERROR"
              2. Populate next available error instance (errors/code, errors/message) using error template with errorCode = 2000101 and errorSubcode = 0000001 with the substitution attributes:
              #attributeDescription = "Last name"
              #attributePath = "lastName"
              #whenCondition = "first name is supplied as input"
              Sample Error Message (Template) = "EIS-Mandatory Data Missing: #attributeDescription [#attributePath] is required when #whenCondition."
              Sample errors/message = "EIS-Mandatory Data Missing: Last name [lastName] is required when first name is supplied as input."

              Tolerance Check Rule: 
              If lastName (tag supplied and contains value other than null or "") and partyType = "ORGANIZATION", return error.

              Failure Scenario
              1. Return HTTP Response Code = 400 (Bad Request) with status = "ERROR"
              2. Populate next available error instance (errors/code, errors/message) using error template with errorCode = 2000102 and errorSubcode = 0000012 with the substitution attributes:
              #attributeDescription = "Last name"
              #attributePath = "lastName"
              #whenCondition = "party type is"
              #attributeValue = partyType value
              Sample Error Message (Template) = "EIS-Invalid Data: #attributeDescription [#attributePath] is not allowed when #whenCondition #attributeValue."
              Sample errors/message for partyType ORGANIZATION = "EIS-Invalid Data: Last name [lastName] is not allowed when party type is ORGANIZATION."

              Value Missing Rule: 
              If lastName, organizationName, and taxIdentifier are all NULL (tag missing or tag supplied with value of null or "") then:

              Failure Scenario
              1. Return HTTP Response Code = 400 (Bad Request) with status = "ERROR"
              2. Populate next available error instance (errors/code, errors/message) using error template with errorCode = 2000101 and errorSubcode = 0000001 with the substitution attributes:
              #attributeDescription = "Last name, organization name, or tax identifier"
              #attributePath = "lastName, organizationName, taxIdentifier"
              #whenCondition = "searching for a party"
              Sample Error Message (Template) = "EIS-Mandatory Data Missing: #attributeDescription [#attributePath] is required when #whenCondition."
              Sample errors/message = "EIS-Mandatory Data Missing: Last name, organization name, or tax identifier [lastName, organizationName, taxIdentifier] is required when searching for a party."

              Tolerance Check Rule: 
              (If firstName is NOT NULL (tag supplied and contains value other than null or "") and lastName is NOT NULL (tag supplied and contains value other than null or "") and the length of firstName + lastName > 32 characters) or (lastName is NOT NULL (tag supplied and contains value other than null or "") and the length of lastName > 33 characters), return error.

              Failure Scenario
              1. Return HTTP Response Code = 400 (Bad Request) with status = "ERROR"
              2. Populate next available error instance (errors/code, errors/message) using error template with errorCode = 2000102 and errorSubcode = 0000006 with the substitution attributes:
               #attributeDescription = " First and last name"
              #attributePath = "firstName, lastName"
              #maximumValue = "32"
              Sample Error Message (Template) = "EIS-Invalid Data: #attributeDescription [#attributePath] must not exceed #maximumValue characters."
              Sample errors/message = "EIS-Invalid Data: First and last name [firstName, lastName] must not exceed 32 characters."

        #- $ref: '#/components/parameters/middleName'
        #- $ref: '#/components/parameters/namePrefix'
        #- $ref: '#/components/parameters/nameSuffix'
        #- $ref: '#/components/parameters/nameGeneration'
        - $ref: '#/components/parameters/organizationName'
          x-source-mapping:
            sourceField: >-
              searchPartiesByNameAddress organizationName
            description: >-
              Set organizationName = searchPartiesOrch organizationName
              
              Tolerance Check Rule: 
              If organizationName is NOT NULL (tag supplied and contains value other than null or "") and firstName or lastName is supplied as input (value other than null or "") then:

              Failure Scenario
              1. Return HTTP Response Code = 400 (Bad Request) with status = "ERROR"
              2. Populate next available error instance (errors/code, errors/message) using error template with errorCode = 2000102 and errorSubcode = 0000028 with the substitution attributes:
              #attributeDescription = "First or last name"
              #attributePath = "firstName, lastName"
              #whenCondition = "organization name is supplied as input"
              Sample Error Message (Template) = "EIS-Invalid Data: #attributeDescription [#attributePath] is not allowed when #whenCondition."
              Sample errors/message = "EIS-Invalid Data: First or last name [firstName, lastName] is not allowed when organization name is supplied as input."

              Tolerance Check Rule: 
              If organizationName is NOT NULL (tag supplied and contains value other than null or "") and (partyType = "PERSON" or partyType is not supplied as input (tag not supplied or supplied with value of null or "")), return error. Note: If partyType is not supplied, the default search looks only for person parties as if partyType = PERSON was supplied as input.

              Failure Scenario
              1. Return HTTP Response Code = 400 (Bad Request) with status = "ERROR"
              2. Populate next available error instance (errors/code, errors/message) using error template with errorCode = 2000102 and errorSubcode = 0000028 with the substitution attributes:
              #attributeDescription = "Organization name"
              #attributePath = "organizationName"
              #whenCondition = "party type is PERSON"
              Sample Error Message (Template) = "EIS-Invalid Data: #attributeDescription [#attributePath] is not allowed when #whenCondition."
              Sample errors/message for partyType PERSON = "EIS-Invalid Data: Organization name [organizationName] is not allowed when party type is PERSON."

              Tolerance Check Rule: 
              If organizationName is NOT NULL (tag supplied and contains value other than null or "") and the length > 36 characters, return error.

              Failure Scenario
              1. Return HTTP Response Code = 400 (Bad Request) with status = "ERROR"
              2. Populate next available error instance (errors/code, errors/message) using error template with errorCode = 2000102 and errorSubcode = 0000006 with the substitution attributes:
               #attributeDescription = "Organization name"
              #attributePath = "organizationName"
              #maximumValue = "36"
              Sample Error Message (Template) = "EIS-Invalid Data: #attributeDescription [#attributePath] must not exceed #maximumValue characters."
              Sample errors/message = "EIS-Invalid Data: Organization name [organizationName] must not exceed 36 characters."

        #- $ref: '#/components/parameters/partyNameStandardizationRequiredIndicator'
        - $ref: '#/components/parameters/addressLine1'
          x-source-mapping:
            sourceField: >-
              searchPartiesByNameAddress addressLine1
            description: >-
              for searchPartiesByNameAddress, set addressLine1 = searchPartiesOrch addressLine1

              Tolerance Check Rule: 
              If addressLine1 is NOT NULL (tag supplied and contains value other than null or "") and the length > 40 characters, return error.

              Failure Scenario
              1. Return HTTP Response Code = 400 (Bad Request) with status = "ERROR"
              2. Populate next available error instance (errors/code, errors/message) using error template with errorCode = 2000102 and errorSubcode = 0000006 with the substitution attributes:
               #attributeDescription = "Postal address line 1"
              #attributePath = "addressLine1"
              #maximumValue = "40"
              Sample Error Message (Template) = "EIS-Invalid Data: #attributeDescription [#attributePath] must not exceed #maximumValue characters."
              Sample errors/message = "EIS-Invalid Data: Postal address line 1 [addressLine1] must not exceed 40 characters."
        #- $ref: '#/components/parameters/addressLine2'
        #- $ref: '#/components/parameters/addressLine3'
        - $ref: '#/components/parameters/postalAddressCity'
          x-source-mapping:
            sourceField: >-
              searchPartiesByNameAddress postalAddressCity
            description: >-
              for searchPartiesByNameAddress, set postalAddressCity = searchPartiesOrch postalAddressCity

              Tolerance Check Rule: 
              If postalAddressCity is NOT NULL (tag supplied and contains value other than null or "") and the length > 25 characters, return error.

              Failure Scenario
              1. Return HTTP Response Code = 400 (Bad Request) with status = "ERROR"
              2. Populate next available error instance (errors/code, errors/message) using error template with errorCode = 2000102 and errorSubcode = 0000006 with the substitution attributes:
               #attributeDescription = "Postal address city"
              #attributePath = "addressLine1"
              #maximumValue = "25"
              Sample Error Message (Template) = "EIS-Invalid Data: #attributeDescription [#attributePath] must not exceed #maximumValue characters."
              Sample errors/message = "EIS-Invalid Data: Postal address city [postalAddressCity] must not exceed 25 characters."

        - $ref: '#/components/parameters/postalAddressStateProvince'
          x-source-mapping:
            sourceField: >-
              searchPartiesByNameAddress postalAddressStateProvince
            description: >-
              for searchPartiesByNameAddress, set postalAddressStateProvince = searchPartiesOrch postalAddressStateProvince

              Reference Check Rule: 
              If attribute is NOT NULL (tag supplied and contains value other than null or "") then validate that attribute exists in stateProvinceValidValues[].stateProvince, where stateProvinceValidValues[].country = "USA", which is returned in response from retrievePersonControls API. Until an optional header attribute is added to API (postalAddressCountry), the country is assumed to be "USA".

              Failure Scenario
              1. Return HTTP Response Code = 400 (Bad Request) with status = "ERROR"
              2. Populate next available error instance (errors/code, errors/message) using error template with errorCode = 2000102 and errorSubcode = 0000001 with the substitution attributes:
              #attributeDescription = "Postal address state/province"
              #attributePath = "postalAddressStateProvince"
              #attributeValue = stateProvince value
              Sample Error Message (Template) = "EIS-Invalid Data: #attributeDescription [#attributePath] #attributeValue is invalid."
              Sample errors/message = "EIS-Invalid Data: Postal address/state province[postalAddressStateProvince] #attributeValue is invalid."
        - $ref: '#/components/parameters/postalCode'
          x-source-mapping:
            sourceField: >-
              searchPartiesByNameAddress postalCode
            description: >-
              For searchPartiesByNameAddress, set postalCode = searchPartiesOrch postalCode

              Tolerance Check Rule: 
                , return error.

              Failure Scenario
              1. Return HTTP Response Code = 400 (Bad Request) with status = "ERROR"
              2. Populate next available error instance (errors/code, errors/message) using error template with errorCode = 2000102 and errorSubcode = 0000030 with the substitution attributes:
              #attributeDescription = "Postal code"
              #attributePath = "postalCode"
              #maximumValue = "9"
              Sample Error Message (Template) = "EIS-Invalid Data: #attributeDescription [#attributePath] must be numeric value and not exceed #maximumValue digits."
              Sample errors/message = "EIS-Invalid Data: Postal code [postalCode] must be numeric value and not exceed 9 digits."
        #- $ref: '#/components/parameters/countryCode'
        - $ref: '#/components/parameters/searchType'
          x-source-mapping:
            sourceField: >-
              searchPartiesByNameAddress searchType
            description: >-
              set postalCode = searchPartiesOrch searchType

              Reference Check Rule: 
              If attribute is NOT NULL (tag supplied and contains value other than null or "") then validate that attribute exists in searchTypeValidValues[].searchType, returned in response from retrievePersonControls API.

              Failure Scenario
              1. Return HTTP Response Code = 400 (Bad Request) with status = "ERROR"
              2. Populate next available error instance (errors/code, errors/message) using error template with errorCode = 2000102 and errorSubcode = 0000001 with the substitution attributes:
              #attributeDescription = "Search type"
              #attributePath = "searchType"
              #attributeValue = searchType value
              Sample Error Message (Template) = "EIS-Invalid Data: #attributeDescription [#attributePath] #attributeValue is invalid."
              Sample errors/message = "EIS-Invalid Data: Search type [searchType] #attributeValue is invalid."

              Tolerance Check Rule: 
              If searchType is NOT NULL (tag supplied and contains value other than null or "") and taxIdentifier is supplied as input (value other than null or "") then:

              Failure Scenario
              1. Return HTTP Response Code = 400 (Bad Request) with status = "ERROR"
              2. Populate next available error instance (errors/code, errors/message) using error template with errorCode = 2000102 and errorSubcode = 0000028 with the substitution attributes:
              #attributeDescription = "Search type"
              #attributePath = "searchType"
              #whenCondition = "searching with tax identifier [taxIdentifier]"
              Sample Error Message (Template) = "EIS-Invalid Data: #attributeDescription [#attributePath] is not allowed when #whenCondition."
              Sample errors/message for partyType PERSON = "EIS-Invalid Data: Search type [searchType] is not allowed when searching with tax identifier [taxIdentifier]."
        - $ref: '#/components/parameters/customerRelationshipTypeFilter'
          x-source-mapping:
            sourceField: >-
              searchPartiesByNameAddress customerRelationshipTypeFilter
            description: >-
              set customerRelationshipTypeFilter = searchPartiesOrch customerRelationshipTypeFilter

              Reference Check Rule: 
              If attribute is NOT NULL (tag supplied and contains value other than null or "") then validate that attribute exists in customerRelationshipTypeFilterValidValues[].customerRelationshipTypeFilter, returned in response from retrievePersonControls API.

              Failure Scenario
              1. Return HTTP Response Code = 400 (Bad Request) with status = "ERROR"
              2. Populate next available error instance (errors/code, errors/message) using error template with errorCode = 2000102 and errorSubcode = 0000001 with the substitution attributes:
              #attributeDescription = "Customer relationship type filter"
              #attributePath = "customerRelationshipTypeFilter"
              #attributeValue = customerRelationshipTypeFilter value
              Sample Error Message (Template) = "EIS-Invalid Data: #attributeDescription [#attributePath] #attributeValue is invalid."
              Sample errors/message = "EIS-Invalid Data: Customer relationship type filter [customerRelationshipTypeFilter] #attributeValue is invalid."
        - $ref: '#/components/parameters/searchPartiesPaginationToken'
          x-source-mapping:
            sourceField: >-
              searchPartiesByNameAddress paginationToken
            description: >-
              set paginationToken = searchPartiesOrch paginationToken
        #- $ref: '#/components/parameters/searchPartiesCurrentRecordLimit'
  /retrieve:
    get:
      x-serviceOperation: Retrieve Party (retrievePartyOrch)
      x-bianVersion: v2
      tags:
        - retrieve
      summary: >-
        Retrieve party demographic information, contact points, party to party relationships (P2P), party to account relationships (P2A), and KYC documentary identifications (retrievePartyOrch). 
      description: >-
