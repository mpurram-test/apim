    relatedAccountsCurrentRecordLimit:
      name: relatedAccountsCurrentRecordLimit
      in: query
      required: false
      description: >-
        The maximum number of related accounts that should be returned in response to this request. This is the limit that should be applied to the single response message.  The relatedAccountsCurrentRecordLimit should not be changed after it has been established because all the following pages will have the same limit. From the second page on, the system does not accept or take into account the alternate value for the relatedAccountsCurrentRecordLimit (i.e. if the first call to the API supplies the value 50, then the API will limit the response to 50 records regardless of the value supplied for relatedAccountsCurrentRecordLimit in the second or later calls).

        The consumer may send a value to limit the records. Although the API accepts the requested limit, the API is constrained to a derived maximum based upon the number and size of the attributes requested.  If the requested number of related accounts per page exceeds the maximum number that can be supported, the API provides an error along with the maximum number of related accounts that can be supported. In other words, if the consumer provides a value of 1000, it is unlikely that the system could return that much data in one request so an error will be returned. As such, choose a reasonable limit. 
        
        If no value is supplied, all records up to the derived maximum will be returned as part of one inquiry request and each page size may vary (based upon the size of the specific list of related accounts returned) and will not return consistent number of related accounts (e.g. 75 could be returned in the first response followed by 73 in the second).

        Note that this limit represents the maximum number of records that the consumer is able to handle in a single message. The actual number of records selected could be more than this or less than this, depending on the number of available records matching the selection criteria. If the result set is more than this limit, the service will return a pagination token (relatedAccountsPaginationToken) to allow the consumer to continue processing the result set.  
      example: 50
      schema:
        type: number
        nullable: false
    retrievePartyToAccountRelationshipsCurrentRecordLimit:
      name: currentRecordLimit
      in: query
      required: false
      description: >-
        The maximum number of related accounts that should be returned in
        response to this request. This is the limit that should be applied to
        the single response message.

        Consumer may send a value to limit the records. If no value is supplied or
