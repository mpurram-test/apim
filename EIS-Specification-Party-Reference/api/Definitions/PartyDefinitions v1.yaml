components:
  securitySchemes:
    OAuth2:
      type: oauth2
      description: Seacoast OAuth 2.0 client credential code flow
      flows:
        clientCredentials:
          tokenUrl: https://api.dev.seacoastbank.com/auth/v1/token
          scopes: {} # Required but may be empty
  parameters:
    systemIdentifier:
      name: systemIdentifier
      required: true
      in: header
      description: 'The Calling Application Mnemonic (i.e. IVR, QFD).'
      example: IVR
      schema:
        type: string
        minLength: 3
        maxLength: 3
    uuid:
      name: uuid
      required: true
      in: header
      description: >-
        The request identifier or UUID can be any alphanumeric string with a max length of 50
        characters. It must be a unique identifier that is generated for each API
        request and should not be duplicated or repeated for subsequent calls. If a transaction fails and the consumer is attempting to retry the failed transaction (with the same request payload), it is expected that the UUID would be the same.
      example: "123e4567-e89b-12d3-a456-426614174000"
      schema:
        type: string
    requestDateTime:
      name: requestDateTime
      required: true
      in: header
      description: >-
        Date/Time the calling application/consumer (systemIdentifier) invoked this API in UTC format (Coordinated Universal Time), CCYY-MM-DDThh:mm:ss.sssZ or CCYY-MM-DDThh:mm:ssZ, unless an alternate time zone is requested by supplying requestTimeZone. 
      example: '2020-03-14T23:59:59.001Z'
      schema:
        type: string
        format: date-time
    agentIdentifier:
      name: agentIdentifier
      required: true
      in: header
      description: >-
        The agent identifier identifies the user who invoked the call. Guidelines 
        for populating are as follows: 1) If the API call originates as a result
        of an action from by an user, from a user-interface (UI) or otherwise, then the
        application can provide the individual’s user identifier 2) If the API call is
        originated by a batch program then the application can send the name of
        the program.
      example: PL00000
      schema:
        type: string
    requestTimeZone:
      name: requestTimeZone
      required: false
      in: header
      description: >-
        Optional attribute that accepts and returns date/time in the requested time zone format. If no value is supplied, then all date/time attributes are accepted in UTC format (Coordinated Universal Time) using either the CCYY-MM-DDThh:mm:ss.sssZ or CCYY-MM-DDThh:mm:ssZ format, and are returned in UTC format, CCYY-MM-DDThh:mm:ss.sssZ. For instance, if "America/New_York" is supplied, then all date/time attributes are accepted in CCYY-MM-DDThh:mm:ss.sss or CCYY-MM-DDThh:mm:ss format and returned in CCYY-MM-DDThh:mm:ss.sss format. The time zone is assumed as EST in the winter and EDT in the summer. 

        The valid values are available from the retrievePersonControls API, timeZoneValidValues[].timeZone. 
      example: America/New_York
      schema:
        type: string
    subscriptionKey:
      name: subscriptionKey
      required: true
      in: header
      description: >-
         The subscription key is a unique, auto-generated access code used to control and track access to published APIs. It acts as a primary security mechanism to ensure that only authorized client applications can call the services/APIs via the API Management gateway. The subscription key functions similarly to a password or an API key but is often tied to a specific "subscription" plan, which defines the level of access, usage limits (rate limits), and associated billing information. 
      example: "{{subscriptionKey}}"
      schema:
        type: string
    searchType:
      name: searchType
      required: false
      in: query
      description: >-
        The type of search to be performed, partial or full. If PARTIAL is requested, a partial match of search criteria will return the party. If FULL is requested, the whole keyword must match the search criteria to return the customer. 
        
        
        PARTIAL: Returns results where the party attribute starts with or contains the search criteria. For example, searching for a postalCode of "338" returns all parties with postal codes beginning with "338" (e.g., 33801, 33813). Searching for addressLine1 of "LAKE" returns all parties with street name within the address line 1 containing "LAKE" (e.g., 98 LAKE BYRD BLVD, 2851 S LAKE LETTA DR, 947 LAKE ANGELO DR, 2720 LAKEVIEW DR). Searching for city of "LAKE" returns all parties with city names beginning with "LAKE" (e.g. LAKE GENEVA, LAKE PARK, LAKE PLACID). Partial matching applies to:
        
          * addressLine1
          * postalAddressCity
          * postalCode
          * firstName
          * organizationName

        When searching for a person (partyType = "PERSON"), the person is returned if the first name begins with the value supplied for firstName and the last name is an exact match. For instance, if the firstName is "JOE" and lastName is "SMITH", then both JOEL SMITH and JOE SMITH are returned in the response. However, the party with first name JOE and last name SMITHSON would not be returned, since the last name must be an exact match regardless of the searchType. When searching for an organization (partyType = "ORGANIZATION"), the organization is returned if the organization name begins with the value supplied for organizationName. For instance, if searching with organizationName of "SMITH", then all organizations that begin with SMITH are returned (e.g., SMITH AUTO LLC, SMITH CAR WASH LLC, SMITH ENTERPRISES, SMITH LAWN SERVICE). The postalAddressStateProvince must be an exact match regardess of the partyType. 

        
        FULL: Returns results only when the keyword is an exact match for the party data.
        
        
        The valid values are available from the retrievePersonControls API, searchTypeValidValues[].searchType. 
        
        
        The search type qualifier is not applicable when searching with tax identifier (taxIdentifier).
      example: "PARTIAL"
      schema:
        type: string
        enum:
          - PARTIAL
          - FULL
    customerRelationshipTypeFilter:
      name: customerRelationshipTypeFilter
      required: false
      in: query
      description: >-
        Filter the parties by the status of the customer relationship. The valid values are available from the retrievePersonControls API, customerRelationshipTypeFilterValidValues[].customerRelationshipTypeFilter. 
      example: "CUSTOMERS_ONLY"
      schema:
        type: string
        enum:
          - ALL
          - CUSTOMERS_ONLY
          - CUSTOMERS_AND_PROSPECTS
          - EXTERNAL_CONTACTS_ONLY
          - PROSPECTS_ONLY
    validationOperation:
      name: validationOperation
      required: false
      in: query
      description: >-
        The validation operation indicates whether the validations are performed in the context of party creation (CREATE), maintenance (UPDATE), search (SEARCH), or retrieve (RETRIEVE). If validation operation is performed in another context, do not provide the attribute as input. 
      example: "CREATE"
      schema:
        type: string
        enum:
          - CREATE
          - UPDATE
          - SEARCH
          - RETRIEVE
    personControlValidationOperation:
      name: validationOperation
      required: false
      in: query
      description: >-
        The validation operation provides the context and use of the control data. By providing the context (validationOperation), only the control data that is specific to the context is returned, in order to avoid returning control data that is not being used in the particular context, thus improving performance of the APIs.  
        
        
        The validation operation indicates whether the validations are performed in the context of validating the person for creation (VALIDATE_CREATE), validating the person for maintenance (VALIDATE_UPDATE), or validating the party for retrieval (VALIDATE_RETRIEVE). All control data leveraged in the context of validating the payload (i.e. all validationOperation values beginning with VALIDATE_) are performed from the validatePerson API. Additionally, any control data required for validation rules that are specific to searching parties and not performed within the validatePerson API are returned when the validation operation is SEARCH (e.g. searchTypeValidValues, customerRelationshipTypeFilterValidValues, taxIdentifierType, stateProvinceValidValues). If the validation operation is not supplied as input, then all the control data is returned.  
      example: "VALIDATE_RETRIEVE"
      schema:
        type: string
        enum:
          - VALIDATE_CREATE
          - VALIDATE_UPDATE
          - VALIDATE_RETRIEVE
          - SEARCH
    organizationControlValidationOperation:
      name: validationOperation
      required: false
      in: query
      description: >-
        The validation operation provides the context and use of the control data. By providing the context (validationOperation), only the control data that is specific to the context is returned, in order to avoid returning control data that is not being used in the particular context, thus improving performance of the APIs.  
        
        
        The validation operation indicates whether the validations are performed in the context of validating the organization for creation (VALIDATE_CREATE), validating the organization for maintenance (VALIDATE_UPDATE), or validating the party for retrieval (VALIDATE_RETRIEVE). All control data leveraged in the context of validating the payload (i.e. all validationOperation values beginning with VALIDATE_) are performed from the validateOrganization API. Additionally, any control data required for validation rules that are specific to searching parties and not performed within the validateOrganization API are returned when the validation operation is SEARCH (e.g. searchTypeValidValues, customerRelationshipTypeFilterValidValues, taxIdentifierType, stateProvinceValidValues). If the validation operation is not supplied as input, then all the control data is returned.  
      example: "VALIDATE_RETRIEVE"
      schema:
        type: string
        enum:
          - VALIDATE_CREATE
          - VALIDATE_UPDATE
          - VALIDATE_RETRIEVE
          - SEARCH
    suppressValidationsIndicator:
      name: suppressValidationsIndicator
      required: false
      in: header
      description: >-
        If the suppress validations indicator is set to true, then certain
        validations will not be performed, provided that the API is executing in
        a non-production environment. If the API is executing in a production
        environment, suppression of validations will NOT be honored. If
        suppressValidationsIndicator = true and API is executing in a
        non-production environment, the following validations will not be
        applied: Social Security Number Format Validation. The capability to
        suppress the SSN format validation is required in the context of
        performing real-time account opening of Choice Home Equity Line of
        Credit accounts because the social security number (SSN) format
        validation conflicts with the empower vendor system, which does not
        permit valid SSNs in non-production environments. 
      example: false
      schema:
        type: boolean
        nullable: false
    retrievePartyToPartyRelationshipPaginationToken:
      name: paginationToken
      in: header
      description: >-
        If no value is supplied, then the first set of related parties (up to
        the currentRecordLimit) will be returned. If additional
        related parties are being requested, then populate the pagination token
        with the token returned during the previous request. For instance, the
        first request returns 50 related parties along with a pagination token
        in the response. The token returned in the response is supplied as input
        for the second request, thus returning related parties 51 to 100, along
        with an updated token that can be supplied to return related parties 101
        to 150.
      required: false
      example: 50
      schema:
        type: string
    searchPartiesPaginationToken:
      name: paginationToken
      in: header
      description: >-
        If no value is supplied, then the first set of matching parties (up to the current record limit of 25) will be returned. If additional matching parties are being requested, then populate the pagination token with the token returned during the previous request. For instance, the first request returns 25 matching parties along with a pagination token in the response. The token returned in the response is supplied as input for the second request, thus returning matching parties 26 to 50, along with an updated token that can be supplied to return matching parties 51
        to 75.
      required: false
      example: "Y|||||P|00000028114|SMITH||"
      schema:
        type: string
    searchPartiesByTaxIdentifierPaginationToken:
