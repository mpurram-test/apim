        equal to sent record count. 
      example: 12
    emailAddressesPaginationToken:
      type: string
      nullable: false
      description: >-
        If more email addresses are available to return, this element will
        contain the pagination token that the consumer can provide to this API
        to obtain the next set of email addresses. 
      example: "WRK,2023-12-18"
    phonesSentRecordCount:
      type: integer
      nullable: false
      description: 'Number of phones included in the response.'
      example: 10
    phonesMatchedRecordCount:
      type: integer
      nullable: false
      description: >-
        Total number of phones. This count will be greater than or
        equal to sent record count. 
      example: 12
    phonesPaginationToken:
      type: string
      nullable: false
      description: >-
        If more phones are available to return, this element will
        contain the pagination token that the consumer can provide to this API
        to obtain the next set of phones. 
      example: "WRK,2023-12-18"
    lastName:
      type: string
      nullable: false
      description: The last name (Surname) of a person party. Last name is required for a person party and cannot be deleted.
      example: Doe
    firstNameRegister:
      type: string
      nullable: false
      description: The first name (given name) of a person party
      example: John
    firstNameUpdate:
      type: string
      nullable: true
      description: >-
        The first name (given name) of a person party. To delete, set attribute to null.
      example: John
    middleNameRegister:
      type: string
      nullable: false
      description: The middle name of a person party. 
      example: David
    middleNameUpdate:
      type: string
      nullable: true
      description: The middle name of a person party. To delete, set attribute to null.
      example: David
    nameSuffixRegister:
      type: string
      nullable: false
      description: >- 
        The name suffix for a person party contains one or more professional suffix or title abbreviations that follows a person's name, indicating their profession, academic achievements, or professional status. Examples include "MD" for medical doctor, "DDS" for Doctor Dental Surgury, "JD" for Juris Doctor, "RN" for Registered Nurse, "CPA" for Certified Public Accountant, "CMA" for Certified Management Accountant, or "MBA" signifies that the person holds a Master of Business Administration degree. The valid values are available from the retrievePersonControls API, nameSuffixValidValues[].nameSuffix.
      example: MBA
    nameSuffixUpdate:
      type: string
      nullable: true
      description: >-
        The name suffix for a person party contains one or more professional suffix or title abbreviations that follows a person's name, indicating their profession, academic achievements, or professional status. Examples include "MD" for medical doctor, "DDS" for Doctor Dental Surgury, "JD" for Juris Doctor, "RN" for Registered Nurse, "CPA" for Certified Public Accountant, "CMA" for Certified Management Accountant, or "MBA" signifies that the person holds a Master of Business Administration degree. The valid values are available from the retrievePersonControls API, nameSuffixValidValues[].nameSuffix. To delete, set attribute to null.
      example: MBA
    nameSuffixDescription:
      type: string
      nullable: true
      description: >-
        The name suffix description for a person party, indicating their profession, academic achievements, or professional status. Examples include "Medical Doctor" for "MD", "Doctor Dental Surgury" for "DDS", "Juris Doctor" for "JD", "Registered Nurse" for "RN", "Certified Public Accountant" for "CPA", "Certified Management Accountant" for "CMA", "Master of Business Administration" for "MBA".
      example: 'Master of Business Administration'
    ownershipPercentage:
      type: number
      nullable: false
      description: >-
        Applicable only for relationship type IS_BENFCL_OWNER. The ownership
        percentage of the Beneficial Owner.
      example: 50
    relationshipPartyTitle:
      type: string
      example: CHIEF_FINANCIAL_OFFICER
      description: >-
        Relationship party title. The relationship party title is applicable for
        the controlling party relationship and certain treasury management
        relationship types. When the relationship type is IS_CNTRLG_PARTY, the
        valid values are available via
        retrieveOrganizationControls API, 
        controllingPartyTitleValidValues[].controllingPartyTitle. When the
        relationship type is one of the treasury management relationships that
        allow a relationship party title (e.g. IS_TM_ACCT_AUTH_SIGNER,
        IS_TM_ACCT_SIGNER, IS_TM_ATSTNG_OFCR, IS_TM_AUTH_SIGNER,
        IS_TM_CHECK_DLG_AUTH_SIGNER, IS_TM_FX_AUTH_SIGNER,
        IS_TM_TMS_AUTH_SIGNER), the valid values are available via
        retrieveOrganizationControls API
        treasuryManagementAuthorityTitleValidValues[].treasuryManagementAuthorityTitle.
    partyRelationshipLastUpdateDateTime:
      description: >-
        Date/time the party relationship was last updated. Attribute is returned in the UTC format CCYY-MM-DDThh:mm:ss.sssZ, unless a specific time zone is requested by supplying requestTimeZone. For instance, if "America/New_York" is specified for requestTimeZone, date/time attribute is returned in CCYY-MM-DDThh:mm:ss.sss format, assuming the time zone is EST in the winter and EDT in the summer.
      type: string
      nullable: false
      format: date-time
      example: '2020-03-14T12:59:06.001Z'
    partyRelationshipLastUpdateUserIdentifier:
      type: string
      nullable: false
      description: The user / process that last updated the relationship
      example: PLXXXXX
    timeZone:
      type: string
      nullable: false
      example: "America/New_York"
      description: >-
        Time zone values (e.g., America/New_York)
    timeZoneDescription:
      type: string
      nullable: false
      example: "EST (Winter), EDT (Summer)"
      description: Time zone description.
    digitalSignature:
      type: string
      nullable: false
      description: >-
        A hexadecimal string representing the list of attributes to be requested for each transaction. Once the digital signature (digitalSignature) has been generated, store it in a configuration file or cache so that subsequent calls to the FIS dynamic API  do not need to generate it. The digital signiture is a hashed list of the requested attributes and does not change unless revisions (additions, deletions) change the list. The digital signiture is the same in test and production environments.
