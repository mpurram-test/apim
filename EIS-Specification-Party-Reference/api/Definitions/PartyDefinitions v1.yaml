        the request.
    individualTaxIdentifierRegularExpression:
      type: string
      nullable: false
      example: '^9[0-9]{2}(5[0-9]|6[0-5]|7[0-9]|8[0-8]|9[0-2]|9[4-9])[0-9]{4}$'
      description: >-
        Individual tax identification number (ITIN) regular expression. The regular expression contains the validation rules required to validate the content of the individual tax identifier (e.g., 9 digits with first digit "9" and fourth and fifth digits in a range of numbers from "50" to "65", "70" to "88", “90” to “92”or “94” to “99”).
    legalEntityIdentifierRegularExpression:
      type: string
      nullable: false
      example: '^[A-Z0-9]{20}$'
      description: >-
        Legal entity identifier (LEI) regular expression. The regular expression
        contains the validation rules required to validate the content of the
        Legal entity identifier (LEI), which must be 20 characters in length and
        contain alphanumeric value (0-9, A-Z). 
