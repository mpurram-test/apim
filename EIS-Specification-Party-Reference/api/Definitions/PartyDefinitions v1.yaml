    searchPartiesCurrentRecordLimit:
      name: currentRecordLimit
      in: query
      required: false
      description: >-
        The maximum number of matching parties that should be returned in
        response to this request. This is the limit that should be applied to
        the single response message.

        Consumer may send a value to limit the records. If no value is supplied or
        zero is supplied, all records up to the maximum of 50 will be returned
        as part of one inquiry request. 

        Note that this number represents the maximum number of records that the
        consumer is able to handle in a single message. The actual number of
        records selected could be more than this or less than this, depending on
        the number of available records matching the selection criteria. If the
        result set is more than this limit, the service will return a pagination token
        (paginationToken) to allow the consumer to continue processing the result set.
      example: 50
      schema:
        type: number
        nullable: false
