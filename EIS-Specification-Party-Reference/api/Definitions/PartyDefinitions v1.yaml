        Option attribute that will filter the Party's relationship to another party. The valid values are available from the retrievePersonControls API and retrieveOrganizationControls API, partyToPartyRelationshipTypeValidValues[].partyToPartyRelationshipType. Examples: 123 = Signer/Non-Owner, 124 = Signer/Owner. If supplied, only related parties matching the supplied relatedPartiesRelationshipType are returned. Multiple values can be supplied as input in a single call using a comma delimiter. For instance, if the relatedPartiesRelationshipType is supplied as "123, 124" any related parties matching the two (2) values are returned. If not specified, then all related parties are returned. 
      example: 124
