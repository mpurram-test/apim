        the result set is more than this limit, the service will return a pagination token
        (relatedAccountsPaginationToken) to allow the consumer to continue
        processing the result set.      
      schema:
        type: number
        nullable: false
        example: 100
    suppressPartyIndicator:
      name: suppressPartyIndicator
      required: false
      in: query
      description: >-
        Optional attribute that indicates if party demographic information, KYC documentary identifications, and limited phones contact points (primary, secondary, fax only) should be suppressed from the response. Suppression of the specified attributes is recommended when invoking this API to obtain the next set of related parties and/or the next set of related accounts when the first invocation did not return them all (i.e., relatedPartiesPaginationToken or relatedAccountsPaginationToken has a value in the response). If the party demographic information, phone contact points, and KYC documentary identifications are not needed in the response when obtaining subsequent sets of the related parties and/or related accounts, then set the value of this attribute to true. Suppressing attributes that are not needed by the consumer will increase the performance of the API. If indicator is not provided, the API will not suppress the specific party attributes (false is the default).  
      example: false
      schema:
        type: boolean
        nullable: false
    suppressRelatedPartiesIndicator:
      name: suppressRelatedPartiesIndicator
      required: false
      in: query
      description: >-
        Optional attribute that indicates if party relationships should be
        suppressed from the response. Suppressing attributes that are not needed
        by the consumer will increase the performance of the API. If indicator
        is not provided, the API will suppress party relationships (true is
        the default). 
      example: true
      schema:
        type: boolean
        nullable: false
    suppressRelatedAccountsIndicator:
      name: suppressRelatedAccountsIndicator
      required: false
      in: query
      description: >-
        Optional attribute that indicates if account relationships should be
        suppressed from the response. Suppressing attributes that are not needed
        by the consumer will increase the performance of the API. If indicator
        is not provided, the API will suppress account relationships (true is the default). 
      example: true
      schema:
        type: boolean
        nullable: false
    suppressEmailAddressesIndicator:
      name: suppressEmailAddressesIndicator
      required: false
      in: query
      description: >-
        Optional attribute that indicates if email addresses should be
        suppressed from the response. Suppressing attributes that are not needed
        by the consumer will increase the performance of the API. If indicator
        is not provided, the API will suppress email addresses (true is the default). 
      example: true
      schema:
        type: boolean
        nullable: false
    suppressPhonesIndicator:
      name: suppressPhonesIndicator
      required: false
      in: query
      description: >-
        Optional attribute that indicates if complete list of phones should be suppressed from the response. Suppressing attributes that are not needed by the consumer will increase the performance of the API. If indicator is not provided, the API will suppress the complete list of phones (true is the default). However, provided that suppressPartyIndicator is false (default value), the primary, secondary, and fax phones are returned with the party demographic information by the retrieveParty API, provided they are defined. As such, the phones array may contain phone numbers with phoneType = "PRI", "SEC", or "FAX" respectively. To obtain the complete list of phones, set suppressPhonesIndicator = false.
      example: true
      schema:
        type: boolean
        nullable: false
    suppressKYCidentificationsIndicator:
      name: suppressKYCidentificationsIndicator
      required: false
      in: query
      description: >-
        Optional attribute that indicates if KYC Documentary identifications
        should be suppressed from the response. Suppressing attributes that are
        not needed by the consumer will increase the performance of the API. If
        indicator is not provided, the API will not suppress KYC Documentary
        identifications (true is the default). 
      example: true
      schema:
        type: boolean
        nullable: false
    suppressPartyRolesIndicator:
      name: suppressPartyRolesIndicator
      required: false
      in: query
      description: >-
        Optional attribute that indicates if party roles should be suppressed
        from the response. Suppressing attributes that are not needed by the
        consumer will increase the performance of the API. If indicator is not
        provided, the API will not suppress party roles (true is the default). 
      example: true
      schema:
        type: boolean
        nullable: false
    partyIdentifier:
      name: partyIdentifier
      in: header
      description: >-
        Customer identifier value. The party identifier is a unique identifier
        for a party.
      example: '2525770'
      required: true
      schema:
        type: string
        nullable: false
        maxLength: 11
    partyIdentifierOptional:
      name: partyIdentifier
      in: header
      description: >-
        Customer identifier value. The party identifier is a unique identifier
        for a party.
      required: false
      schema:
        type: string
        nullable: false
        maxLength: 11
    accountTypeForAccountRelationships:
      name: accountType
      in: header
      description: >-
        Account Type which classifies the type of product with which an account
        is associated (e.g. DDA, SVG, CDS, CCA, DCA, SLA, RCA, ILA, MTG). If
        supplied, only accounts matching the supplied accountType are returned.
        Multiple values can be supplied as input in a single call using a comma
        delimiter. For instance, if accountType is supplied as "DDA, SVG", then
        only the accounts with accountType both DDA, SVG are returned. 
      required: false
      example: DDA
      schema:
        type: string
        nullable: false
    accountStatusCodeForAccountRelationships:
      name: accountStatusCode
      in: header
      description: >-
        Status of the account. Valid values: C = Closed, O = Open, V = Virtual Bank Manager (Internet accounts only). If supplied, only accounts matching the supplied accountStatusCode are returned. Only one value can be supplied as input in a single call. For instance, if the accountStatusCode is supplied as "O", then only the accounts with accountStatusCode O (Open) are returned.  
      required: false
      example: O
      schema:
        type: string
        nullable: false
    partyRoleCodeForAccountRelationships:
      name: partyRoleCode
      in: header
      description: >-
        Party Account Role (e.g. 023 for Joint, 033 for Custodian). The party account role specifies the party's role/relationship to the account. If supplied, only accounts matching the supplied partyRoleCode are returned. Multiple values can be supplied as input in a single call using comma delimiter. For instance, if the partyRoleCode is supplied as "023, 033", then only the accounts with partyRoleCode 023 or 033 are
        returned. The valid values are available from the retrievePersonControls API and retrieveOrganizationControls API, partyRoleCodeValidValues[].partyRoleCode. 
      required: false
      example: 023
      schema:
        type: string
        nullable: false
    taxIdentifier:
      name: taxIdentifier
      in: header
      description: >-
        ** MANDATORY FOR SEARCHES BY TAX IDENTIFIER **  Party tax identifier. Tax identifier type is optional. If supplied, API will ensure tax identifier is in valid format for the type of tax identifier.
      required: false
      example: "283551234"
      schema:
        type: string
        nullable: true
    taxIdentifierLastFour:
      name: taxIdentifierLastFour
      in: header
      description: >-
        ** OPTIONAL FOR SEARCHES BY PHONE AND Account- **  Last 4 digits of the tax identifier. 
      required: false
      example: "1234"
      schema:
        type: string
        nullable: true
    taxIdentifierRequired:
      name: taxIdentifier
      in: header
      description: >-
        ** MANDATORY FOR SEARCHES BY TAX IDENTIFIER **  Party tax identifier. Tax identifier type is optional. If supplied, API will ensure tax identifier is in valid format for the type of tax identifier.
      required: true
      example: "283551234"
      schema:
        type: string
        nullable: true
    taxIdentifierType:
      name: taxIdentifierType
      in: header
      description: >-
        ** OPTIONAL FOR SEARCHES BY TAX IDENTIFIER **  The type of tax identifier. Tax identifier type is optional when tax identifier is supplied as input. If supplied, the API will ensure that the tax identifier is supplied and in the valid format for the type of tax identifier. The valid values are available from the retrievePersonControls API or retrieveOrganizationControls API, taxIdentifierTypeValidValues[].taxIdentifierType. 
      required: false
      example: "SSN"
      schema:
        type: string
        nullable: true
    partyType:
      name: partyType
      in: query
      description: |-
        ** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS ** 
         Denotes if a party is an person/individual or organization/business. Valid values are "PERSON" or "ORGANIZATION". If the party type is not supplied as input, the API searches for person/individual parties only (partyType = PERSON). To search for an organization/business, set partyType = "ORGANIZATION". The party type qualifier is not applicable when searching with tax identifier (taxIdentifier).
      required: false
      example: "PERSON"
      schema:
        type: string
        nullable: true
    phoneNumber:
      name: phoneNumber
      in: header
      description: |-
        ** MANDATORY WHEN SEARCHING BY PHONE ** Phone Number
      required: false
      example: "3303910005"
      schema:
        type: string
        nullable: true
    firstName:
      name: firstName
      in: header
      description: >-
        ** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS **  The first name (given name) of a person
        party.  Search is case insensitive.  Applicable for person parties only
        (partyType = PERSON). 
      required: false
      example: "John"
      schema:
        type: string
        nullable: true
    lastName:
      name: lastName
      in: header
      description: >-
        ** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS **  The last name (surname) of a person party. 
        Search is case insensitive.  Applicable for person parties only
        (partyType = PERSON).
      required: false
      example: "Doe"
      schema:
        type: string
        nullable: true
    middleName:
      name: middleName
      in: header
      description: >-
        ** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS **  The middle name of a person party. 
        Search is case insensitive.  Applicable for person parties only
        (partyType = PERSON).
      required: false
      example: "David"
      schema:
        type: string
        nullable: true
    namePrefix:
      name: prefix
      in: header
      description: >-
        ** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS **  The name prefix/title (greeting or salutation) for a person party (e.g. MR, MS, MRS, MISS, DR). The valid values are available from the retrievePersonControls API, namePrefixValidValues[].namePrefix. Search is case insensitive. Applicable for person parties only (partyType = PERSON).
      required: false
      example: "DR"
      schema:
        type: string
        nullable: true
    nameSuffix:
      name: suffix
      in: header
      description: >-
        ** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS **  The name suffix for a person party, which contains one or more professional suffix or title abbreviations that follows a person's name, indicating their profession, academic achievements, or professional status. Examples include "MD" for medical doctor, "DDS" for Doctor Dental Surgury, "JD" for Juris Doctor, "RN" for Registered Nurse, "CPA" for Certified Public Accountant, "CMA" for Certified Management Accountant, or "MBA" signifies that the person holds a Master of Business Administration degree. The valid values are available from the retrievePersonControls API, nameSuffixValidValues[].nameSuffix. Search is case insensitive. Example: PHD  Applicable for person parties only (partyType = PERSON).
      required: false
      example: "MD"
      schema:
        type: string
        nullable: true
    nameGeneration:
      name: generation
      in: header
      description: >-
        ** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS **  Party/Customer Generation. The valid values are available from the retrievePersonControls API, nameGenerationValidValues[].nameGeneration.  Search is case insensitive.  Examples: JR, SR, I, II, III.  Applicable for person parties only (partyType = PERSON).
      required: false
      example: "SR"
      schema:
        type: string
        nullable: true
    organizationName:
      name: organizationName
      in: header
      description: >-
        ** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS **  Business/Organization Customer Name. 
        Search is case insensitive.  Applicable for organization parties only
        (partyType = ORGANIZATION).
      required: false
      example: "AUTOMATION TECHNOLOGIES CONSULTING INC"
      schema:
        type: string
        nullable: true
    partyNameStandardizationRequiredIndicator:
      name: partyNameStandardizationRequiredIndicator
      required: false
      in: header
      description: >-
        ** OPTIONAL FOR SEARCHES THAT INCLUDE PARTY NAME ATTRIBUTES **  Controls
        whether name standardization is applied to party name attributes before
        searching.  True: (default value) Standardize name attributes before
        searching. False: DO NOT standarize name attributes before searching.
      example: true
      schema:
        type: boolean
        nullable: false
    addressLine1:
      name: addressLine1
      in: header
      description: >-
        ** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS **  Party postal address line 1. Search is
        case insensitive.
      required: false
      example: "401 MAIN ST"
      schema:
        type: string
        nullable: true
    addressLine2:
      name: addressLine2
      in: header
      description: >-
        ** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS **  Party postal address line 2. Search is case insensitive.
      required: false
      schema:
        type: string
        nullable: true
    addressLine3:
      name: addressLine3
      in: header
      description: |-
        ** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS ** Party postal address line 3. Search is case insensitive.
      required: false
      schema:
        type: string
        nullable: true
    postalAddressCity:
      name: postalAddressCity
      in: header
      description: >-
        ** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS ** Party postal address city. Search is
        case insensitive.
      required: false
      example: HINCKLEY
      schema:
        type: string
        nullable: true
    postalAddressStateProvince:
      name: postalAddressStateProvince
      in: header
      description: >-
        ** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS ** Party postal address state or province. If country is USA, then values are defined by codes available from the retrievePersonControls API, stateProvinceValidValues[].stateProvince. Until postalAddressCountryCode is added as an optional header attribute, the country is assumed to be USA. 
      required: false
      example: "OH"
      schema:
        type: string
        nullable: true
    postalCode:
      name: postalCode
      in: header
      description: >-
        ** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS ** Party postal address postal code (zip
        code). 
      required: false
      example: 44233
      schema:
        type: string
        nullable: true
    countryCode:
      name: postalAddressCountryCode
      in: header
      description: >-
        ** OPTIONAL WHEN SEARCHING BY NAME OR ADDRESS ** Party postal address country code. The valid values are available from the retrievePersonControls API and retrieveOrganizationControls API, countryCodeValidValues[].countryISOalpha3Code. Search is case in-sensitive.
      required: false
      example: "USA"
      schema:
        type: string
        nullable: true
    postalAddressStandardizationRequiredIndicator:
      name: postalAddressStandardizationRequiredIndicator
      required: false
      in: header
      description: >-
        ** OPTIONAL FOR SEARCHES THAT INCLUDE ADDRESS ATTRIBUTES **  True: (default
        value) Standardize address attributes before searching. False: DO NOT
        standarize address attributes before searching. Address standardization can
        only be performed on US addresses. If country code is specified and it is not
        equal to USA, then the address will NOT be standardized. The following
        address search attributes are required before an address can be
        standardized: addressLine1, city, and stateProvince OR addressLine1 and
        postalCode.
      example: true
      schema:
        type: boolean
        nullable: false
  schemas:
    accountIdentifier:
      type: string
      description: >-
        Unique identifier for an account. 
      example: 3340002482
    accountSourceSystemIdentifier:
      type: string
      nullable: false
      example: DP
      description: >-
        The account source system identifier (e.g. CBM = Cardbase Management, CPN = Customer Profitability, DP = Deposit System, LN = Loan System, MLOAN = Mortgage loan, RP = Relationship Packaging, SB = Safe Deposit Box). The valid values are available from the retrieveAccountControls API, accountSourceSystemIdentifierValidValues[].accountSourceSystemIdentifier.
    accountSourceSystemIdentifierDescription:
      type: string
      example: "Deposit System"
      description: >-
        The account source system identifier description (e.g. CBM = Cardbase Management, CPN = Customer Profitability, DP = Deposit System, LN = Loan System, MLOAN = Mortgage loan, RP = Relationship Packaging, SB = Safe Deposit Box).
    bankIdentifier:
      type: string
      nullable: false
      example: '422'
      description: >-
        Bank identifier associated with the account. The valid values are available from the retrieveAccountControls API, bankIdentifierValidValues[].bankIdentifier.
    accountToPartyInvolvements:
      description: >-
        The account to party involvements array specifies each role/relationship
        that the account has to the party. Some parties may have more than role/relationship to the account (POA and Beneficiary). However, at Seacoast, the party is not defined with one party role of POA and another party role of beneficiary. Instead, the party is assigned a party role code that combines both roles (POA and Beneficiary). As such, this accountToPartyInvolvements array is not needed.
      type: array
      items:
        type: object
        properties:
          partyRoleCode:
            $ref: '#/components/schemas/partyRoleCode'
          authorizingPartyIdentifier:
            $ref: '#/components/schemas/authorizingPartyIdentifier'
        required:
          - partyRoleCode
    partyRoleCode:
      description: >-
        Party Account Role (e.g. 023 for Joint (and), 033 for Custodian). The
        party account role specifies the party's role/relationship to the
        account. The valid values are available from the retrievePersonControls API and retrieveOrganizationControls APIs, accountPartyRoleCodeValidValues[].partyRoleCode. 
      type: string
      nullable: false
      example: "023"
    partyRoleCodeDescription:
      description: >-
        Party Account Role (e.g. 023 for Joint (and), 033 for Custodian) Description. 
      type: string
      nullable: false
      example: "JOINT"
    authorizingPartyIdentifier:
      description: >-
        Required in order to retrieve a linkage relationship (partyRoleCode = "LNK"), delegate relationship (partyRoleCode = "DLG") or authorized signer relationship       (partyRoleCode = "AUS"). This attribute contains the party source system identifier (e.g., IVR, QFD) of the party that is authorizing the relationship. The authorizing party (identified with authorizingPartyIdentifier) must have a first-name or other-name relationship to the account in order to authorize another party with a linkage, delegate, or authorized signer relationship. Party must already exist in the system of record.
      type: string
      nullable: false
      example: '100005489772'
    branchIdentifierAccount:
      description: >-
        Branch assigned to the Account- Initially established with account
        opening process and will only be updated to a new branch if existing
        branch has closed.
      type: string
      nullable: false
      example: '00123'
    accountTaxIdentifier:
      description: Account tax Identifier.
      type: string
      nullable: false
      example: '342925198'
    accountTaxIdentifierType:
      description: >-
        Account tax Identifier Type. Examples include: SSN, EIN, ITIN. The valid values are available from the retrievePersonControls API or retrieveOrganizationControls API, taxIdentifierTypeValidValues[].taxIdentifierType. 
      type: string
      nullable: false
      example: SSN
    taxIdentifierType:
      description: >-
        Tax Identifier Type. Examples include: SSN, EIN, ITIN. The valid values are available from the retrievePersonControls API or retrieveOrganizationControls API, taxIdentifierTypeValidValues[].taxIdentifierType. 
      type: string
      nullable: false
      example: SSN
    taxIdentifierTypeDescription:
      description: Tax identifier type description. 
      type: string
      example: "SOCIAL SECURITY NUMBER"
    accountAddressLine1:
      type: string
      description: Account Address line 1
      nullable: false
      example: Billing Department
    accountAddressLine2:
      type: string
      nullable: false
      description: Account Address line 2
      example: 401 Main Street
    accountAddressLine3:
      type: string
      nullable: false
      description: Account Address line 3
      example: Suite 100
    accountAddressLine4:
      type: string
      nullable: false
      description: Account Address line 4
      example: Office 7
    accountAddressLine5:
      type: string
      nullable: false
      description: Account Address line 5
      example: "Attn: Billing"
    accountCity:
      type: string
      nullable: false
      description: Account Address City/Town Name
      example: Hinckley
    accountStateProvince:
      type: string
      nullable: false
      description: Account Address State or Province Code
      example: OH
    accountPostalCode:
      type: string
      nullable: false
      description: Account Address Zip or Postal Code
      example: 44233
    accountCounty:
      type: string
      nullable: false
      description: Account Address County
      example: Medina
    accountCountryCode:
      type: string
      nullable: false
      description: Account Address Country (ISO Code) 
      example: USA
    accountEffectiveStartMonthDay:
      type: string
      nullable: false
      description: Address Effective Start Month Day
      example: 0129
    accountEffectiveEndMonthDay:
      type: string
      nullable: false
      description: Address Effective End Month Day
      example: '0513'
    accountPitneyBowesIdentifier:
      type: string
      nullable: false
      description: >-
        GEO Unique Physical Location Identifier that is essential to Pitney
        Bowes enrichment data process.  Can be used to compare addresses even
        though spelled differently.  Also can be obtained from other partners
        using Pitney Bowes Key from Master Location Data.
      example: P0000NHG4LYZ
    accountAddressLastUpdateDateTime:
      description: >-
        Address last update date/time. Attribute is returned in the UTC format CCYY-MM-DDThh:mm:ss.sssZ, unless a specific time zone is requested by supplying requestTimeZone. For instance, if "America/New_York" is specified for requestTimeZone, date/time attribute is returned in CCYY-MM-DDThh:mm:ss.sss format, assuming the time zone is EST in the winter and EDT in the summer.
      type: string
      nullable: false
      format: date-time
      example: '2020-03-14T12:59:060Z'
    accountAddressLastUpdateUserIdentifier:
      description: Address Last Updated By Name
      type: string
      nullable: false
      example: PL00000
    partyRoleEffectiveDate:
      description: >-
        Effective date of the party role/relationship (partyRoleCode). ISO Format accepted CCYY-MM-DD.
      type: string
      format: date
      nullable: false
      example: '2000-01-01'
    partyRoleExpiryDate:
      description: >-
        Expiration date of the party role/relationship (partyRoleCode). If expiration date is not defined, then party/role relationship does not expire. ISO Format accepted CCYY-MM-DD.
      type: string
      format: date
      nullable: false
      example: '2030-01-01'
    openingDate:
      description: >-
        The date the account was opened in its source system. ISO Format accepted CCYY-MM-DD.
      type: string
      format: date
      nullable: false
      example: '2000-01-01'
    closingDate:
      description: >-
        The date the account was closed. ISO Format accepted CCYY-MM-DD.
      type: string
      format: date
      nullable: false
      example: '2025-07-31'
    nextStatementDate:
      description: >-
        The date the statement will next be produced for the account. ISO Format accepted CCYY-MM-DD.
      type: string
      format: date
      nullable: false
      example: '2025-07-31'
    lastStatementDate:
      description: >-
        The date a statement was last produced for the account. If the account is new, the last statement date will not be returned until a statement is produced. ISO Format accepted CCYY-MM-DD.
      type: string
      format: date
      nullable: false
      example: '2025-06-30'
    purgeDateTime:
      description: >-
        The date the account was purged. Attribute is returned in the UTC format CCYY-MM-DDThh:mm:ss.sssZ, unless a specific time zone is requested by supplying requestTimeZone. For instance, if "America/New_York" is specified for requestTimeZone, date/time attribute is returned in CCYY-MM-DDThh:mm:ss.sss format, assuming the time zone is EST in the winter and EDT in the summer.
      type: string
      format: date
      nullable: false
      example: '2000-01-01T23:59:59.001Z'
    accountStatusCode:
      description: >-
        Status of the account. Valid values: C = Closed, O = Open, V = Virtual Bank Manager (Internet accounts only). The value of "V" is not applicable to deposit accounts. The value of "V" is applicable to loans and other miscelleneous accounts. The valid values are available from the retrieveAccountControls API, accountStatusCodeValidValues[].accountStatusCode.
      type: string
      nullable: false
      example: O
    accountOpenStatusCode:
      description: >-
        Open Status of the account. Valid values: 
        <Blank> = Open account
        B = Closed by bank
        C = Closed by customer
        E = Pending closed by customer
        K = Pending closed by bank
        P = Closed by processing
        Z = Zero balance account
        O = Opened by deposit
        The valid values are available from the retrieveAccountControls API, accountOpenStatusCodeValidValues[].accountOpenStatusCode.
      type: string
      nullable: false
      example: O
    availableBalance:
      description: >-
        Available balance, which is the amount of funds available for withdrawal.  The balance is calculated as ledger balance minus holds minus float plus unused provisional credit (PRA) plus/minus today's on-line transactions plus related account's available balance if applicable. This is a monetary value with 2 decimal positions precision. 
      type: number
      format: decimal
      nullable: false
      example: 10456.17
    currentBalance:
      description: >-
        Current balance. The balance is calculated as ledger balance plus/minus today's on-line activity. This is a monetary value with 2 decimal positions precision. 
      type: number
      format: decimal
      nullable: false
      example: 10456.17
    ledgerBalance:
      description: >-
        Ledger balance, as of last posting date. This is a monetary value with 2 decimal positions precision. 
      type: number
      format: decimal
      nullable: false
      example: 12456.17
    interestRate:
      description: >-
        Interest Rate. This is a monetary value with 2 decimal positions precision. 
      type: number
      format: decimal
      nullable: false
      example: 12456.17
    accountTitleType:
      description: >-
        Account title line type that denotes its sequence. Examples values include: LGL_TTL_LN_1, LGL_TTL_LN_2. The valid values are available from the retrievePersonControls API, accountTitleTypeValidValues[].accountTitleType.
      type: string
      nullable: false
      example: LGL_TTL_LN_1
    accountTitleLine:
      description: This is the free form text attribute which contains the legal titling value.
      type: string
      nullable: false
      example: NORMAN PAINTING & LANDSCAPING INC.
    accountTitleStartDateTime:
      description: >-
        Date the account title was created or last changed. Attribute is returned in the UTC format CCYY-MM-DDThh:mm:ss.sssZ, unless a specific time zone is requested by supplying requestTimeZone. For instance, if "America/New_York" is specified for requestTimeZone, date/time attribute is returned in CCYY-MM-DDThh:mm:ss.sss format, assuming the time zone is EST in the winter and EDT in the summer.
      type: string
      nullable: false
      format: date-time
      example: '2020-01-01T23:59:59.001Z'
    accountTitleSourceSystemIdentifier:
      description: Account Title Source System Identifier
      type: string
      nullable: false
      example: CIF
    accountCategory:
      type: string
      nullable: false
      example: D
      description: >-
        The account category identifies the category of the account in the system of record. In the context of a deposit account, valid values include: C = Certificate of deposit, D = Demand deposit account, K = Revolving Credit, M = Money Market, S = Savings. The valid values are available from the retrieveAccountControls API, accountCategoryValidValues[].accountCategory.
    accountCategoryDescription:
      type: string
      nullable: false
      example: "Demand deposit account"
      description: >-
        The account category description identifies the category of the account in the system of record. The attribute contains the descriptive attribute explaining the account category (accountCategory). In the context of a deposit account, valid values include: C = Certificate of deposit, D = Demand deposit account, K = Revolving Credit, M = Money Market, S = Savings.
    accountType:
      type: string
      nullable: false
      example: "010"
      description: >-
        The account type identifies the type of account in the system of record (e.g. 010 = CLASSIC CHECKING, 033 = PREMIER MM-PERSONAL, 049 = SEACOAST SAVINGS). The valid values are available from the retrieveAccountControls API, accountTypeValidValues[].    accountType.
    productCode:
      description: >-
        Product code which further qualifies the account type (e.g. FCC, ICK,
        BCK in context of accountType of DDA).
      type: string
      nullable: false
