        - $ref: '#/components/parameters/requestDateTime'
        - $ref: '#/components/parameters/agentIdentifier'
          x-source-mapping:
            sourceField: >-
              /rest/IBSCI/v2/customers/{CICustNbr}/related-accounts GET EffectiveUserId
            description: >-
              Set EffectiveUserId = agentIdentifier
        - $ref: '#/components/parameters/requestTimeZone'
