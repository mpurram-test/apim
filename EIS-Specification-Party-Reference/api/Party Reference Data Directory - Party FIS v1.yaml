          nullable: false
          example: SUCCESS
        data:
          $ref: '#/components/schemas/retrievePartyResponse'
      required:
        - status
        - data
    retrievePartyResponse:
      type: object
      properties:
        partyIdentifier:
          $ref: './Definitions/PartyDefinitions v1.yaml#/components/schemas/partyIdentifier'
          x-source-mapping:
            sourceField: >-
              /rest/IBSCI/v2/customers/{CIApplNbr} GET Entity/customer/CIApplNbr
            description: >-
              Return as-is. CIS customer number to inquire on. Maximum length of 11.
        partyType:
          $ref: './Definitions/PartyDefinitions v1.yaml#/components/schemas/partyType'
          x-source-mapping:
            sourceField: >-
              /rest/IBSCI/v2/customers/{CIApplNbr} GET Entity/customer/CISexCodeInd
            description: >-
              Return "ORGANIZATION" when CISexCodeInd = 'O'
              Return "PERSON" when CISexCodeInd = 'M' or 'F'
              If CISexCodeInd has no value (or not returned in response), return "PERSON" when CIBirthdate contains valid date
              
              CISexCodeInd indicates the type of customer. For individual customers, the valid values are: F = Female. M = Male. For organization customers, the valid value is: O = Organization. 
        personName:
          $ref: '#/components/schemas/personNameForRetrievePartyResponse'
        birthDate:
