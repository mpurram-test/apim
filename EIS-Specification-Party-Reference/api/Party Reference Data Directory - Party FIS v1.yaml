          type: string
          nullable: false
          example: SUCCESS
        data:
          type: object
          properties:
            sentRecordCount:
              $ref: './Definitions/PartyDefinitions v1.yaml#/components/schemas/matchingPartiesSentRecordCount'
              x-source-mapping:
                sourceField: >-
                   /rest/IBSCISRH/v4/customers/search/name-address GET Entity/queryParametersSearchTaxNumber/ciRequestedResTimes
                description: >-
                  Return as-is. Indicates the number of customer records being returned.
            #matchedRecordCount:
            #  $ref: './Definitions/PartyDefinitions v1.yaml#/components/schemas/matchingPartiesMatchedRecordCount'
            paginationToken:
              $ref: './Definitions/PartyDefinitions v1.yaml#/components/schemas/matchingPartiesPaginationToken'
              x-source-mapping:
                sourceField: >-
                   /rest/IBSCISRH/v4/customers/search/name-address GET Entity/queryParametersSearchTaxNumber/nextPageCursor
                   /rest/IBSCISRH/v4/customers/search/name-address GET Entity/queryParametersSearchTaxNumber/morePages
                description: >-
                  Return nextPageCursor (e.g., 2525770) if morePages = "Y". The attribute nextPageCursor will return a value if there are more customers to be returned. To view the next set of matching parties/customers, resubmit the inquiry using the value (customer number to start the next search) returned here. 
