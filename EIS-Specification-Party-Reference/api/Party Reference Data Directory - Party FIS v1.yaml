            description: >-
              Set CICustNbr = partyIdentifier
        - $ref: '#/components/parameters/retrievePartyToAccountRelationshipsPaginationToken'
          x-source-mapping:
            sourceField: >-
              /rest/IBSCI/v2/customers/{CICustNbr}/related-accounts GET RepoCIRltApplCde1
              /rest/IBSCI/v2/customers/{CICustNbr}/related-accounts GET RepoCIRltApplNbr01
              /rest/IBSCI/v2/customers/{CICustNbr}/related-accounts GET RepoCIRltBnkNbr1
              /rest/IBSCI/v2/customers/{CICustNbr}/related-accounts GET RepoCIEnt1ToEnt2RltCde
              /rest/IBSCI/v2/customers/{CICustNbr}/related-accounts GET RepoCIEnt2ToEnt1RltCde
              /rest/IBSCI/v2/customers/{CICustNbr}/related-accounts GET RepoCIRltEffDte
            description: >-
              The pagination token (paginationToken), if populated from a prior call, contains six (6) comma separated attributes in the following order: 
              RepoCIRltApplCde1 (accountSourceSystemIdentifier)
              RepoCIRltApplNbr01 (accountIdentifier)
              RepoCIRltBnkNbr1 (bankIdentifier)
              RepoCIEnt1ToEnt2RltCde (partyRoleType)
              RepoCIEnt2ToEnt1RltCde (partyRoleCode)
              RepoCIRltEffDte (partyRoleEffectiveDate)

              Set RepoCIRltApplCde1 = first value (e.g., DP) contained in the paginationToken (e.g., DP,3340002482,001,023,901,2023-12-18) from the prior call.

              Set RepoCIRltApplNbr01 = second value (e.g., 3340002482) contained in the paginationToken (e.g., DP,3340002482,001,023,901,2023-12-18) from the prior call.

              Set RepoCIRltBnkNbr1 = third value (e.g., 001) contained in the paginationToken (e.g., DP,3340002482,001,023,901,2023-12-18) from the prior call.

              Set RepoCIEnt1ToEnt2RltCde = fourth value (e.g., 023) contained in the paginationToken (e.g., DP,3340002482,001,023,901,2023-12-18) from the prior call.

              Set RepoCIEnt2ToEnt1RltCde = fifth value (e.g., 901) contained in the paginationToken (e.g., DP,3340002482,001,023,901,2023-12-18) from the prior call.

              Set RepoCIRltEffDte = sixth value (e.g., 2023-12-18) contained in the paginationToken (e.g., DP,3340002482,001,023,901,2023-12-18) from the prior call.    
